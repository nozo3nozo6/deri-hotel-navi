name: Deploy to Shin Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: sv6825.wpx.ne.jp
          username: yobuho
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 10022
          script: |
            cd ~/public_html
            git pull origin main
