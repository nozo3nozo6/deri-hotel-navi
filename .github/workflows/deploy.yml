name: Deploy to Shin Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate auth-config.php
        env:
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          mkdir -p api
          printf "<?php\ndefine('SUPABASE_SERVICE_KEY', '%s');\ndefine('SUPABASE_URL', 'https://ojkhwbvoaiaqekxrbpdd.supabase.co');\ndefine('SESSION_TIMEOUT', 1800);\ndefine('MAX_LOGIN_ATTEMPTS', 5);\ndefine('LOCKOUT_TIME', 900);\n" "$SERVICE_KEY" > api/auth-config.php

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.git*' --exclude='node_modules' --exclude='.github' --exclude='sql' --exclude='CLAUDE.md' --exclude='progress.md' --exclude='package*.json' --exclude='*.bak' --exclude='*.bak.old' --exclude='analysis-report.html' --exclude='fix-report*.html' --exclude='fix-rls-policies.sql' --exclude='api/migrate-passwords.php' --exclude='ogp.svg'
          path: ./
          remote_path: /home/yobuho/yobuho.com/public_html/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: 10022
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_key_pass: ${{ secrets.SSH_PASSPHRASE }}
