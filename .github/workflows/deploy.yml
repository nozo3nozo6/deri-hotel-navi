name: Deploy to Shin Server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REMOTE_HOST: ${{ secrets.SSH_HOST }}
  REMOTE_USER: ${{ secrets.SSH_USERNAME }}
  REMOTE_PATH: /home/yobuho/yobuho.com/public_html
  SSH_PORT: 10022

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $SSH_PORT $REMOTE_HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install dependencies (root)
        run: npm ci

      - name: Install dependencies (Astro)
        run: cd astro-src && npm ci

      - name: Build Astro SSG
        run: |
          cd astro-src && npx astro build
          cp dist/portal-men.html dist/portal-women.html dist/portal-men-same.html dist/portal-women-same.html dist/portal-este.html ../
          cp dist/index.html ../index.html
          cp dist/legal.html dist/terms.html dist/privacy.html dist/contact.html dist/shop-register.html dist/plan.html dist/plan-campaign.html dist/yobuchat.html dist/yobuchat-campaign.html ../
          mkdir -p ../guide
          cp dist/guide/*.html ../guide/ 2>/dev/null || true
          for f in dist/partner/*.html; do [ -f "$f" ] && cp "$f" "../partner-$(basename $f)"; done
          mkdir -p ../deli.yobuho.com ../jofu.yobuho.com ../same.yobuho.com ../loveho.yobuho.com ../este.yobuho.com
          cp dist/deli.html ../deli.yobuho.com/index.html
          cp dist/jofu.html ../jofu.yobuho.com/index.html
          cp dist/same.html ../same.yobuho.com/index.html
          cp dist/loveho.html ../loveho.yobuho.com/index.html
          cp dist/este.html ../este.yobuho.com/index.html
          for sub in deli.yobuho.com jofu.yobuho.com same.yobuho.com loveho.yobuho.com este.yobuho.com; do
            cp ../favicon.ico ../$sub/favicon.ico
            cp ../favicon.svg ../$sub/favicon.svg
            cp ../gtag-init.js ../$sub/gtag-init.js
            cp ../gtag-lazy.js ../$sub/gtag-lazy.js
            cp ../font-async.js ../$sub/font-async.js
          done

      - name: Auto cache buster
        run: |
          HASH=$(git rev-parse --short HEAD)
          echo "Cache buster: $HASH"
          sed -i -E "s/\?v=[a-zA-Z0-9]+/?v=$HASH/g" portal.html
          sed -i -E "s/\?v=[a-zA-Z0-9]+/?v=$HASH/g" portal-men.html portal-women.html portal-men-same.html portal-women-same.html portal-este.html
          sed -i -E "s/\?v=[a-zA-Z0-9]+/?v=$HASH/g" shop-admin.html admin.html chat.html 2>/dev/null || true
          sed -i "s/CACHE_HASH/$HASH/g" hotel-search.js

      - name: Generate sitemap.xml
        run: node generate-sitemap.js

      - name: Generate db-config.php
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          CHAT_RETENTION_SECRET: ${{ secrets.CHAT_RETENTION_SECRET }}
          CHAT_SYNC_SECRET: ${{ secrets.CHAT_SYNC_SECRET }}
          CHAT_NOTIFY_SECRET: ${{ secrets.CHAT_NOTIFY_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p api
          printf "<?php\ndefine('DB_HOST', '%s');\ndefine('DB_NAME', '%s');\ndefine('DB_USER', '%s');\ndefine('DB_PASS', '%s');\ndefine('CHAT_RETENTION_SECRET', '%s');\ndefine('CHAT_SYNC_SECRET', '%s');\ndefine('CHAT_NOTIFY_SECRET', '%s');\ndefine('GEMINI_API_KEY', '%s');\n" "$DB_HOST" "$DB_NAME" "$DB_USER" "$DB_PASS" "$CHAT_RETENTION_SECRET" "$CHAT_SYNC_SECRET" "$CHAT_NOTIFY_SECRET" "$GEMINI_API_KEY" > api/db-config.php

      - name: Generate vapid-config.php
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          mkdir -p api
          if [ -n "$VAPID_PUBLIC_KEY" ]; then
            printf "<?php\ndefine('VAPID_PUBLIC_KEY', '%s');\ndefine('VAPID_PRIVATE_KEY', '%s');\ndefine('VAPID_SUBJECT', '%s');\n" "$VAPID_PUBLIC_KEY" "$VAPID_PRIVATE_KEY" "$VAPID_SUBJECT" > api/vapid-config.php
            echo "vapid-config.php generated"
          else
            echo "VAPID_PUBLIC_KEY not set — skipping (push disabled)"
          fi

      - name: Deploy code via rsync
        run: |
          rsync -avz \
            --exclude='.git*' --exclude='node_modules' --exclude='.github' \
            --exclude='sql' --exclude='CLAUDE.md' --exclude='README.md' --exclude='progress.md' \
            --exclude='HANDOFF-*.md' --exclude='PROPOSAL-*.md' \
            --exclude='package*.json' --exclude='*.bak' --exclude='*.bak.old' \
            --exclude='analysis-report.html' --exclude='fix-report*.html' \
            --exclude='fix-rls-policies.sql' --exclude='ogp.svg' \
            --exclude='generate-*.js' --exclude='generate-*.mjs' \
            --exclude='update-*.js' --exclude='import-*.js' --exclude='scripts' \
            --exclude='astro-src' --exclude='.env' --exclude='.env.example' \
            --exclude='.eslintrc*' --exclude='vitest.config.*' \
            --exclude='deli.yobuho.com' --exclude='jofu.yobuho.com' \
            --exclude='same.yobuho.com' --exclude='loveho.yobuho.com' --exclude='este.yobuho.com' \
            --exclude='db-local.js' --exclude='.eslintrc.json' \
            --exclude='handover-*.md' --exclude='pagefind-data.json' \
            --exclude='pagefind' --exclude='master-data.json' \
            --exclude='area-data.json' --exclude='hotel-data' \
            --exclude='search-index.json' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key" \
            ./ $REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH/

      - name: Deploy subdomain LP files
        run: |
          for sub in deli jofu same loveho este; do
            rsync -avz \
              -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key" \
              ./${sub}.yobuho.com/ $REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH/${sub}.yobuho.com/
          done

      - name: Generate static JSON + Pagefind data on server
        run: |
          ssh -p $SSH_PORT -i ~/.ssh/deploy_key $REMOTE_USER@$REMOTE_HOST "
            cd $REMOTE_PATH
            php api/generate-master-data.php
            php api/generate-area-data.php
            php api/generate-hotel-data.php
            php api/generate-search-index.php
            php api/generate-pagefind-data.php
          "

      - name: Download pagefind-data.json from server
        run: scp -P $SSH_PORT -i ~/.ssh/deploy_key $REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH/pagefind-data.json ./pagefind-data.json

      - name: Build Pagefind index
        run: node generate-pagefind-index.mjs

      - name: Upload Pagefind index to server
        run: |
          rsync -avz --delete \
            -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key" \
            ./pagefind/ $REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH/pagefind/

      - name: Purge Cloudflare cache
        run: |
          CF_ZONE=$(echo "${{ secrets.CLOUDFLARE_ZONE_ID }}" | tr -d '[:space:]')
          CF_TOKEN=$(echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | tr -d '[:space:]')
          RESPONSE=$(curl -s --connect-timeout 10 --max-time 30 \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' 2>&1) || true
          echo "Cloudflare response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "Cloudflare cache purged successfully"
          else
            echo "::warning::Cloudflare purge failed: $RESPONSE"
          fi

      - name: Notify IndexNow (Bing/Yandex/Naver)
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          KEY="2c7fd71f6dbd0f67b6af6c9d8082443b"

          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only "$BEFORE_SHA" HEAD 2>/dev/null || true)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
          fi

          declare -a URLS=()

          if echo "$CHANGED" | grep -qE '^(astro-src/src/(layouts|components)/|style\.css|astro-src/src/styles/)'; then
            URLS+=("https://yobuho.com/" "https://yobuho.com/deli/" "https://yobuho.com/jofu/" "https://yobuho.com/same-m/" "https://yobuho.com/same-f/" "https://yobuho.com/este/")
          fi

          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              astro-src/src/pages/index.astro) URLS+=("https://yobuho.com/") ;;
              astro-src/src/pages/portal-men.astro) URLS+=("https://yobuho.com/deli/") ;;
              astro-src/src/pages/portal-women.astro) URLS+=("https://yobuho.com/jofu/") ;;
              astro-src/src/pages/portal-men-same.astro) URLS+=("https://yobuho.com/same-m/") ;;
              astro-src/src/pages/portal-women-same.astro) URLS+=("https://yobuho.com/same-f/") ;;
              astro-src/src/pages/portal-este.astro) URLS+=("https://yobuho.com/este/") ;;
              astro-src/src/pages/deli/index.astro) URLS+=("https://yobuho.com/deli/") ;;
              astro-src/src/pages/jofu/index.astro) URLS+=("https://yobuho.com/jofu/") ;;
              astro-src/src/pages/este/index.astro) URLS+=("https://yobuho.com/este/") ;;
              astro-src/src/pages/same/index.astro) URLS+=("https://yobuho.com/same-m/" "https://yobuho.com/same-f/") ;;
              astro-src/src/pages/shop-register.astro) URLS+=("https://yobuho.com/shop-register.html") ;;
              astro-src/src/pages/legal.astro) URLS+=("https://yobuho.com/legal.html") ;;
              astro-src/src/pages/privacy.astro) URLS+=("https://yobuho.com/privacy.html") ;;
              astro-src/src/pages/terms.astro) URLS+=("https://yobuho.com/terms.html") ;;
              astro-src/src/pages/contact.astro) URLS+=("https://yobuho.com/contact.html") ;;
              astro-src/src/pages/guide/*.astro)
                name=$(basename "$f" .astro)
                URLS+=("https://yobuho.com/guide/${name}.html")
                ;;
            esac
          done <<< "$CHANGED"

          if [ ${#URLS[@]} -eq 0 ]; then
            echo "No URL changes detected — skipping IndexNow submission"
            exit 0
          fi

          UNIQUE=$(printf '%s\n' "${URLS[@]}" | sort -u)
          COUNT=$(echo "$UNIQUE" | wc -l | tr -d ' ')
          URL_JSON=$(echo "$UNIQUE" | awk 'BEGIN{ORS=""} {printf "%s\"%s\"", (NR>1?",":""), $0}')

          PAYLOAD="{\"host\":\"yobuho.com\",\"key\":\"$KEY\",\"keyLocation\":\"https://yobuho.com/${KEY}.txt\",\"urlList\":[$URL_JSON]}"

          echo "Submitting $COUNT URLs to IndexNow:"
          echo "$UNIQUE"

          RESPONSE=$(curl -s -o /tmp/indexnow-body.txt -w "%{http_code}" --connect-timeout 10 --max-time 30 \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" 2>&1) || true

          BODY=$(cat /tmp/indexnow-body.txt 2>/dev/null || echo "")
          echo "IndexNow HTTP status: $RESPONSE"
          [ -n "$BODY" ] && echo "IndexNow body: $BODY"

          case "$RESPONSE" in
            200|202) echo "IndexNow submission accepted" ;;
            *) echo "::warning::IndexNow submission returned $RESPONSE" ;;
          esac

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
