name: Sync kichifu.com news (admi2888)

# admi2888.com/news を kichifu の news テーブルへ毎日取込み、Astro を再ビルドして公開する。
#   news はビルド時取得(SSG)なので「サーバーで取込 → 再build → dist/ デプロイ」を1本で回す必要がある。
#   （DBだけ更新する cron では静的ページに反映されないため）
on:
  schedule:
    - cron: '0 1 * * *'   # 10:00 JST（昼の本日出勤お知らせを拾う）
    - cron: '0 9 * * *'   # 18:00 JST（夜の本日出勤お知らせを拾う）
  workflow_dispatch:

env:
  REMOTE_HOST: ${{ secrets.SSH_HOST }}
  REMOTE_USER: ${{ secrets.SSH_USERNAME }}
  REMOTE_PATH: /home/yobuho/kichifu.com/public_html
  SSH_PORT: 10022
  CF_ZONE_ID: 0804b2fd34bd6eda7f833ef80406ded9   # kichifu.com の Cloudflare Zone（非機密）

jobs:
  sync-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for i in 1 2 3 4 5; do
            if ssh-keyscan -p "$SSH_PORT" -T 20 "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null && [ -s ~/.ssh/known_hosts ]; then
              echo "ssh-keyscan ok (attempt $i)"; break
            fi
            echo "ssh-keyscan attempt $i failed, retrying in 5s..."; sleep 5
          done
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::warning::ssh-keyscan could not fetch host key; relying on StrictHostKeyChecking=accept-new"
          fi

      # サーバー上で admi の最新お知らせを取込み（DB更新＋画像を /uploads/news/ に再ホスト）。
      # db-config.php はサーバー保全のものを使うため、ランナーでの生成は不要。
      - name: Import admi news on server
        run: |
          SSH_OPTS="-p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          n=0
          until ssh $SSH_OPTS $REMOTE_USER@$REMOTE_HOST \
            'cd '"$REMOTE_PATH"'/api && php import-admi-news.php --pages=3 --update'; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "::error::news import failed after 3 attempts"; exit 1; fi
            echo "import attempt $n failed, retrying in 15s..."; sleep 15
          done

      # 取込後の DB を live API から拾って静的ページを再生成
      - name: Build Astro (static)
        working-directory: astro-kichifu
        run: npm ci && npm run build

      - name: Deploy dist/ (static front) via rsync
        run: |
          SSH_OPTS="ssh -p $SSH_PORT -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          n=0
          until rsync -avz -e "$SSH_OPTS" astro-kichifu/dist/ $REMOTE_USER@$REMOTE_HOST:$REMOTE_PATH/; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "::error::rsync dist/ failed after 3 attempts"; exit 1; fi
            echo "rsync dist/ attempt $n failed, retrying in 15s..."; sleep 15
          done

      - name: Purge Cloudflare cache
        run: |
          CF_TOKEN=$(echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | tr -d '[:space:]')
          RESPONSE=$(curl -s --connect-timeout 10 --max-time 30 \
            -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' 2>&1) || true
          echo "Cloudflare response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "Cloudflare cache purged"
          else
            echo "::warning::Cloudflare purge failed (HTML is DYNAMIC so non-critical): $RESPONSE"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
