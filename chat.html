<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">
<meta name="theme-color" content="#9b2d35">
<meta name="robots" content="noindex,nofollow">
<title>💬 YobuChat</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://yobuho.com https://chat.yobuho.com wss://chat.yobuho.com https://cloudflareinsights.com;">
<link rel="icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/chat-manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="YobuChat">
<link rel="stylesheet" href="/chat.css?v=96">
</head>
<body>
<div id="chat-root" class="loading">
  <div id="chat-header">
    <div class="chat-header-left">
      <button type="button" id="btn-header-back" class="header-back hidden" aria-label="受信一覧に戻る">‹</button>
      <span id="chat-visitor-name" class="visitor-name hidden"></span>
    </div>
    <div class="chat-header-center">
      <span id="chat-shop-name">読み込み中…</span>
    </div>
    <div class="chat-header-right">
      <span id="chat-status-dot" class="status-dot offline" aria-hidden="true"></span>
      <span id="chat-status-label" class="status-label" data-i18n="status.offline">受付停止中</span>
      <div id="chat-owner-toggle" class="owner-toggle hidden">
        <label class="toggle-switch">
          <input type="checkbox" id="online-toggle">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" data-i18n="owner.notify">通知</span>
      </div>
    </div>
  </div>

  <!-- Owner inbox list -->
  <div id="owner-inbox" class="owner-panel hidden">
    <div class="inbox-header">
      <h2 data-i18n="inbox.title">📥 受信チャット</h2>
      <div class="inbox-header-btns">
        <button type="button" id="btn-refresh-inbox" class="mini-btn" data-i18n="inbox.refresh">更新</button>
        <button type="button" id="btn-owner-logout" class="mini-btn" data-i18n="inbox.logout">ログアウト</button>
      </div>
    </div>
    <ul id="inbox-list" class="inbox-list"></ul>
  </div>

  <!-- Chat thread (visitor view or owner reply view) -->
  <div id="chat-thread" class="chat-thread">
    <div id="chat-messages" class="chat-messages" aria-live="polite"></div>

    <div id="visitor-note" class="chat-note hidden"></div>
    <div id="reservation-hint" class="chat-note reservation-hint hidden" data-i18n="note.reservation">💡ご予約･お約束は､お電話またはLINEなどでお願いいたします</div>
    <div id="cast-view-banner" class="chat-note hidden" style="background:#fff3cd;color:#7a5200;border-left:3px solid #d4a043;"></div>

    <div id="nickname-area" class="nickname-area hidden">
      <label for="visitor-nickname" class="nickname-label" data-i18n="nickname.label">ニックネーム(任意)</label>
      <input type="text" id="visitor-nickname" class="nickname-input" maxlength="20" placeholder="未記入の場合は匿名になります" data-i18n-placeholder="nickname.placeholder" autocomplete="off">
      <label class="visitor-notify-inline">
        <input type="checkbox" id="visitor-notify-toggle">
        <span class="visitor-notify-title" data-i18n="notify.email_opt_in">返信を📩で通知</span>
      </label>
    </div>

    <div id="visitor-notify" class="visitor-notify hidden">
      <div id="visitor-notify-body" class="visitor-notify-body">
        <input type="email" id="visitor-notify-email" class="visitor-notify-email" placeholder="your@email.com" maxlength="255" autocomplete="email" inputmode="email">
        <button type="button" id="visitor-notify-save" class="visitor-notify-save" data-i18n="notify.save">登録</button>
      </div>
      <div id="visitor-notify-status" class="visitor-notify-status hidden">
        <span id="visitor-notify-status-msg"></span>
        <button type="button" id="visitor-notify-close-link" class="visitor-notify-close-link hidden" data-i18n="notify.close">確認画面を閉じる</button>
      </div>
      <button type="button" id="visitor-notify-resend" class="visitor-notify-resend hidden" data-i18n="notify.resend">確認メールを再送</button>
      <button type="button" id="visitor-notify-edit" class="visitor-notify-edit hidden" data-i18n="notify.edit">メールアドレスを変更</button>
    </div>

    <div id="owner-templates" class="owner-templates hidden">
      <p class="hint" data-i18n="template.title">定型文:</p>
      <div id="template-list" class="template-list"></div>
    </div>

    <div id="chat-input-area" class="chat-input-area">
      <div id="owner-quick" class="emoji-popup hidden">
        <button type="button" class="quick-btn" data-quick="🙏" aria-label="感謝・お願い・お詫び">🙏</button>
        <button type="button" class="quick-btn" data-quick="🙇‍♀️" aria-label="深い感謝・謝罪（女性）">🙇‍♀️</button>
        <button type="button" class="quick-btn" data-quick="🙇‍♂️" aria-label="深い感謝・謝罪（男性）">🙇‍♂️</button>
        <button type="button" class="quick-btn" data-quick="😊" aria-label="笑顔・親しみ">😊</button>
        <button type="button" class="quick-btn" data-quick="☺️" aria-label="優しい笑顔">☺️</button>
        <button type="button" class="quick-btn" data-quick="😄" aria-label="明るい対応">😄</button>
        <button type="button" class="quick-btn" data-quick="😀" aria-label="明るい対応">😀</button>
        <button type="button" class="quick-btn" data-quick="🤝" aria-label="よろしく・提携">🤝</button>
        <button type="button" class="quick-btn" data-quick="✅" aria-label="確認・承知">✅</button>
        <button type="button" class="quick-btn" data-quick="👍" aria-label="承知・了解">👍</button>
        <button type="button" class="quick-btn" data-quick="💡" aria-label="提案・アイデア">💡</button>
        <button type="button" class="quick-btn" data-quick="✨" aria-label="感謝・ポジティブ">✨</button>
        <button type="button" class="quick-btn" data-quick="🌟" aria-label="おすすめ・特別">🌟</button>
        <button type="button" class="quick-btn" data-quick="🎉" aria-label="お祝い・イベント">🎉</button>
        <button type="button" class="quick-btn" data-quick="💖" aria-label="可愛い・おすすめ">💖</button>
        <button type="button" class="quick-btn" data-quick="🥰" aria-label="可愛い・おすすめ">🥰</button>
        <button type="button" class="quick-btn" data-quick="🔥" aria-label="熱意・おすすめ">🔥</button>
        <button type="button" class="quick-btn" data-quick="🚀" aria-label="勢い・ポジティブ">🚀</button>
      </div>
      <div id="visitor-quick" class="emoji-popup hidden">
        <button type="button" class="quick-btn" data-quick="💕" aria-label="2つのハート">💕</button>
        <button type="button" class="quick-btn" data-quick="💖" aria-label="きらめくハート">💖</button>
        <button type="button" class="quick-btn" data-quick="✨" aria-label="キラキラ">✨</button>
        <button type="button" class="quick-btn" data-quick="🎀" aria-label="リボン">🎀</button>
        <button type="button" class="quick-btn" data-quick="😊" aria-label="笑顔">😊</button>
        <button type="button" class="quick-btn" data-quick="🥰" aria-label="ハート笑顔">🥰</button>
        <button type="button" class="quick-btn" data-quick="🥺" aria-label="お願い・うるうる">🥺</button>
        <button type="button" class="quick-btn" data-quick="😳" aria-label="照れ・驚き">😳</button>
        <button type="button" class="quick-btn" data-quick="🙈" aria-label="照れ隠し">🙈</button>
        <button type="button" class="quick-btn" data-quick="❤️" aria-label="ハート">❤️</button>
        <button type="button" class="quick-btn" data-quick="🤤" aria-label="メロメロ">🤤</button>
        <button type="button" class="quick-btn" data-quick="💘" aria-label="矢のハート">💘</button>
        <button type="button" class="quick-btn" data-quick="💓" aria-label="鼓動ハート">💓</button>
        <button type="button" class="quick-btn" data-quick="🔰" aria-label="初心者">🔰</button>
        <button type="button" class="quick-btn" data-quick="💞" aria-label="回るハート">💞</button>
        <button type="button" class="quick-btn" data-quick="🌟" aria-label="星">🌟</button>
        <button type="button" class="quick-btn" data-quick="💜" aria-label="紫ハート">💜</button>
        <button type="button" class="quick-btn" data-quick="❣️" aria-label="ハート強調">❣️</button>
        <button type="button" class="quick-btn" data-quick="😍" aria-label="ハート目">😍</button>
        <button type="button" class="quick-btn" data-quick="😇" aria-label="天使">😇</button>
        <button type="button" class="quick-btn" data-quick="😙" aria-label="キス">😙</button>
        <button type="button" class="quick-btn" data-quick="💌" aria-label="ラブレター">💌</button>
        <button type="button" class="quick-btn" data-quick="😏" aria-label="にやり">😏</button>
        <button type="button" class="quick-btn" data-quick="🫶" aria-label="ハートハンド">🫶</button>
        <button type="button" class="quick-btn" data-quick="🥲" aria-label="うるうる笑顔">🥲</button>
        <button type="button" class="quick-btn" data-quick="😌" aria-label="安心">😌</button>
        <button type="button" class="quick-btn" data-quick="💗" aria-label="ピンクハート">💗</button>
        <button type="button" class="quick-btn" data-quick="💏" aria-label="キスカップル">💏</button>
        <button type="button" class="quick-btn" data-quick="🔍" aria-label="検索">🔍</button>
        <button type="button" class="quick-btn" data-quick="😉" aria-label="ウインク">😉</button>
        <button type="button" class="quick-btn" data-quick="🙄" aria-label="やれやれ">🙄</button>
        <button type="button" class="quick-btn" data-quick="❓" aria-label="疑問">❓</button>
        <button type="button" class="quick-btn" data-quick="🤩" aria-label="興奮">🤩</button>
        <button type="button" class="quick-btn" data-quick="‼️" aria-label="強調">‼️</button>
        <button type="button" class="quick-btn" data-quick="😭" aria-label="号泣">😭</button>
        <button type="button" class="quick-btn" data-quick="💑" aria-label="カップル">💑</button>
      </div>
      <textarea id="chat-input" rows="1" maxlength="500" placeholder="メッセージを入力..." data-i18n-placeholder="input.placeholder" autocomplete="off"></textarea>
      <button type="button" id="emoji-toggle" class="emoji-toggle hidden" aria-label="絵文字">😊</button>
      <button type="button" id="chat-send" class="send-btn" aria-label="送信" data-i18n="input.send">送信</button>
    </div>

  </div>

  <!-- 埋込時のみ: 直リンク誘導（iframeで動作不調時のフォールバック） -->
  <div id="embed-direct-link" class="embed-direct-link hidden">
    <span class="embed-direct-link-label">うまく動かない場合は</span>
    <a id="embed-direct-link-anchor" href="#" target="_blank" rel="noopener" class="embed-direct-link-anchor">直リンクはこちら ↗</a>
    <div id="embed-cast-picker" class="embed-cast-picker hidden">
      <label for="embed-cast-select" class="embed-cast-label">💁 キャスト指名:</label>
      <select id="embed-cast-select" class="embed-cast-select">
        <option value="">選択…</option>
      </select>
    </div>
  </div>

  <div id="chat-footer" class="chat-footer">
    <select id="lang-select" class="lang-select" aria-label="言語">
      <option value="ja">🇯🇵 日本語入力</option>
      <option value="en">🇺🇸 English Input</option>
      <option value="zh">🇨🇳 中文(简) 输入</option>
      <option value="zh-tw">🇹🇼 中文(繁) 輸入</option>
      <option value="ko">🇰🇷 한국어 입력</option>
    </select>
    <button type="button" id="font-size-toggle" class="font-size-btn" aria-label="文字サイズ変更" title="文字サイズ"><span class="font-size-icon" aria-hidden="true">A</span><span id="font-size-label">中</span></button>
    <button type="button" id="btn-close-session" class="footer-btn hidden" data-i18n="thread.close">🔒 チャット終了</button>
    <button type="button" id="btn-block-user" class="footer-btn danger hidden" data-i18n="thread.block">🚫 ブロック</button>
    <a id="footer-brand" class="footer-brand" href="https://yobuho.com/" target="_blank" rel="noopener">
      <span class="footer-brand-row">
        <span class="footer-brand-name">YobuChat</span>
        <span class="footer-brand-ruby">よぶちゃ</span>
      </span>
      <span class="footer-brand-row">
        <span class="footer-brand-by">by</span>
        <span class="footer-brand-site">🏨 YobuHo.com</span>
      </span>
    </a>
  </div>

  <button type="button" id="owner-login-link" class="owner-login-link-hidden" hidden></button>

  <div id="chat-error" class="chat-error hidden"></div>
  <div id="network-banner" class="network-banner hidden" role="status" aria-live="polite"></div>
</div>

<!-- Owner login modal -->
<div id="owner-login-modal" class="owner-login-modal hidden" role="dialog" aria-modal="true" aria-labelledby="owner-login-title">
  <div class="owner-login-card">
    <div class="owner-login-head">
      <h2 id="owner-login-title">👤 オーナーログイン</h2>
      <button type="button" id="owner-login-close" class="owner-login-close" aria-label="閉じる">✕</button>
    </div>
    <p class="owner-login-desc">shop-admin のログイン情報でサインインしてください</p>
    <form id="owner-login-form" class="owner-login-form" autocomplete="on">
      <label class="owner-login-label">
        <span>メールアドレス</span>
        <input type="email" id="owner-login-email" name="email" autocomplete="username" required>
      </label>
      <label class="owner-login-label">
        <span>パスワード</span>
        <input type="password" id="owner-login-password" name="password" autocomplete="current-password" required>
      </label>
      <div id="owner-login-error" class="owner-login-error hidden"></div>
      <button type="submit" id="owner-login-submit" class="owner-login-submit">ログイン</button>
      <p class="owner-login-note">※ このチャットの店舗を運営するオーナー専用です</p>
    </form>
  </div>
</div>

<script src="/chat.js?v=145"></script>
</body>
</html>
