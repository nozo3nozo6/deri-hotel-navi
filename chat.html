<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#9b2d35">
<meta name="robots" content="noindex,nofollow">
<title>💬 YobuChat - YobuHo チャット</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://yobuho.com https://cloudflareinsights.com;">
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/chat.css?v=17">
</head>
<body>
<div id="chat-root" class="loading">
  <div id="chat-header">
    <div class="chat-header-inner">
      <span id="chat-shop-name">読み込み中…</span>
      <span id="chat-status-dot" class="status-dot offline" aria-hidden="true"></span>
      <span id="chat-status-label" class="status-label" data-i18n="status.offline">オフライン</span>
    </div>
    <div class="chat-header-right">
      <select id="lang-select" class="lang-select" aria-label="言語">
        <option value="ja">🇯🇵 日本語</option>
        <option value="en">🇺🇸 English</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="ko">🇰🇷 한국어</option>
      </select>
      <button type="button" id="font-size-toggle" class="font-size-btn" aria-label="文字サイズ変更" title="文字サイズ"><span aria-hidden="true">🔤</span><span id="font-size-label">中</span></button>
      <div id="chat-owner-toggle" class="owner-toggle hidden">
        <label class="toggle-switch">
          <input type="checkbox" id="online-toggle">
          <span class="slider"></span>
        </label>
        <span class="toggle-label" data-i18n="owner.accept">受付</span>
      </div>
      <a id="home-link" class="home-link hidden" href="https://yobuho.com/" target="_blank" rel="noopener" aria-label="yobuho.com">🏠 yobuho.com</a>
    </div>
  </div>

  <!-- Owner inbox list -->
  <div id="owner-inbox" class="owner-panel hidden">
    <div class="inbox-header">
      <h2 data-i18n="inbox.title">📥 受信チャット</h2>
      <div class="inbox-header-btns">
        <button type="button" id="btn-refresh-inbox" class="mini-btn" data-i18n="inbox.refresh">更新</button>
        <button type="button" id="btn-owner-logout" class="mini-btn" data-i18n="inbox.logout">ログアウト</button>
      </div>
    </div>
    <ul id="inbox-list" class="inbox-list"></ul>
  </div>

  <!-- Chat thread (visitor view or owner reply view) -->
  <div id="chat-thread" class="chat-thread">
    <div id="chat-messages" class="chat-messages" aria-live="polite"></div>

    <div id="visitor-note" class="chat-note hidden">匿名でOK。お気軽にご相談ください！</div>

    <div id="quick-questions" class="quick-questions hidden">
      <div class="quick-row">
        <button type="button" class="quick-btn" data-quick="今すぐ呼べますか？" data-i18n="quick.now">今すぐ呼べる？</button>
      </div>
    </div>

    <div id="nickname-area" class="nickname-area hidden">
      <label for="visitor-nickname" class="nickname-label" data-i18n="nickname.label">ニックネーム（任意）</label>
      <input type="text" id="visitor-nickname" class="nickname-input" maxlength="20" placeholder="例: たろう" data-i18n-placeholder="nickname.placeholder" autocomplete="off">
    </div>

    <div id="owner-templates" class="owner-templates hidden">
      <p class="hint" data-i18n="template.title">定型文:</p>
      <div id="template-list" class="template-list"></div>
    </div>

    <div id="chat-input-area" class="chat-input-area">
      <textarea id="chat-input" rows="2" maxlength="500" placeholder="メッセージを入力..." data-i18n-placeholder="input.placeholder" autocomplete="off"></textarea>
      <button type="button" id="chat-send" class="send-btn" aria-label="送信" data-i18n="input.send">送信</button>
    </div>

    <div id="chat-exit" class="chat-exit hidden">
      <button type="button" id="btn-back-inbox" class="exit-btn" data-i18n="thread.back">← 受信一覧に戻る</button>
      <button type="button" id="btn-block-user" class="exit-btn danger" data-i18n="thread.block">🚫 このユーザーをブロック</button>
    </div>
  </div>

  <button type="button" id="owner-login-link" class="owner-login-link-hidden" hidden></button>

  <div id="chat-error" class="chat-error hidden"></div>
</div>

<!-- Owner login modal -->
<div id="owner-login-modal" class="owner-login-modal hidden" role="dialog" aria-modal="true" aria-labelledby="owner-login-title">
  <div class="owner-login-card">
    <div class="owner-login-head">
      <h2 id="owner-login-title">👤 オーナーログイン</h2>
      <button type="button" id="owner-login-close" class="owner-login-close" aria-label="閉じる">✕</button>
    </div>
    <p class="owner-login-desc">shop-admin のログイン情報でサインインしてください</p>
    <form id="owner-login-form" class="owner-login-form" autocomplete="on">
      <label class="owner-login-label">
        <span>メールアドレス</span>
        <input type="email" id="owner-login-email" name="email" autocomplete="username" required>
      </label>
      <label class="owner-login-label">
        <span>パスワード</span>
        <input type="password" id="owner-login-password" name="password" autocomplete="current-password" required>
      </label>
      <div id="owner-login-error" class="owner-login-error hidden"></div>
      <button type="submit" id="owner-login-submit" class="owner-login-submit">ログイン</button>
      <p class="owner-login-note">※ このチャットの店舗を運営するオーナー専用です</p>
    </form>
  </div>
</div>

<script src="/chat.js?v=17"></script>
</body>
</html>
