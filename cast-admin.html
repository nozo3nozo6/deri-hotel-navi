<html lang="ja">
<head>
<meta charset="UTF-8">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-250LFPCPCE"></script>

<style>
:root{
    --gold:#c9a96e;--rose:#b5627a;--rose-dim:#9a4e65;--rose-bg:rgba(181,98,122,.07);--rose-border:rgba(181,98,122,.22);
    --bg:#f8f7f5;--bg-2:#ffffff;--bg-3:#f3f1ee;
    --border:#e8e4e0;--border-s:#d5d0cb;
    --text:#1a1a1a;--text-1:#1a1a1a;--text-2:#555;--text-3:#999;
    --red:#c05050;--green:#2e8b57;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:40px 20px 80px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:.12em;color:var(--gold);margin-bottom:10px;text-align:center;}
.logo em{font-style:italic;font-weight:600;}
.logo-sub{font-size:11px;color:var(--text-3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:36px;text-align:center;}
.card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:18px;box-shadow:0 2px 12px rgba(0,0,0,.03);}
.login-card{max-width:420px;width:100%;padding:36px 32px;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.08);}
.card-title{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--text-1);}
.f-group{margin-bottom:16px;}
.f-label{display:block;font-size:12px;font-weight:700;color:var(--text-3);margin-bottom:6px;letter-spacing:.3px;}
.f-input{width:100%;padding:11px 14px;background:#fff;border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.f-input:focus{border-color:var(--rose);background:rgba(181,98,122,.03);}
textarea.f-input{resize:vertical;min-height:88px;font-size:14px;}
.pw-toggle{display:flex;align-items:center;gap:8px;margin-top:10px;cursor:pointer;font-size:13px;color:var(--text-3);min-height:44px;}
.pw-toggle input{accent-color:var(--rose);cursor:pointer;width:18px;height:18px;margin:0;}
.btn{display:inline-block;padding:10px 18px;background:#fff;border:1px solid var(--border-s);border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,border-color .15s;color:var(--text-2);}
.btn:hover{background:var(--bg-3);}
.btn.primary{background:var(--rose);border-color:var(--rose);color:#fff;font-weight:700;}
.btn.primary:hover{background:var(--rose-dim);}
.btn.danger{color:var(--red);border-color:rgba(192,80,80,.4);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{width:100%;padding:14px;background:var(--rose);border:none;border-radius:var(--r);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.8px;transition:background .2s,opacity .2s;min-height:48px;}
.btn-primary:hover:not(:disabled){background:var(--rose-dim);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.err-msg{display:none;font-size:13px;color:var(--red);margin-top:12px;padding:10px 14px;background:rgba(192,80,80,.08);border:1px solid rgba(192,80,80,.25);border-radius:8px;line-height:1.6;}

/* header */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
.hdr-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:.1em;color:var(--gold);}
.hdr-logo em{font-style:italic;font-weight:600;}
.hdr-email{font-size:12px;color:var(--text-3);}
.hdr .btn-logout{padding:8px 14px;font-size:12px;}

/* main */
.main-wrap{max-width:880px;margin:0 auto;padding:20px 16px 60px;}
.tabs{display:flex;gap:4px;margin-bottom:0;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-btn{padding:10px 18px;border:1px solid var(--border);border-bottom:none;background:var(--bg-3);cursor:pointer;font-size:13px;font-family:inherit;color:#555;font-weight:500;border-radius:8px 8px 0 0;margin-bottom:-1px;transition:background .15s,color .15s;min-height:44px;white-space:nowrap;}
.tab-btn:hover{background:#fff;color:#333;}
.tab-btn.active{font-weight:bold;background:#fff;color:var(--rose);border-bottom:1px solid #fff;}
.tab-content{display:none;padding-top:18px;}
.tab-content.active{display:block;}

/* shop card */
.shop-card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.shop-card-hdr{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.shop-img{width:72px;height:96px;border-radius:8px;object-fit:cover;background:var(--bg-3);border:1px solid var(--border);flex-shrink:0;}
.shop-img-placeholder{width:72px;height:96px;border-radius:8px;background:var(--bg-3);border:1px dashed var(--border-s);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text-3);flex-shrink:0;}
.shop-body{flex:1;min-width:180px;}
.shop-meta{font-size:11px;color:var(--text-3);margin-bottom:4px;}
.shop-display-name{font-size:17px;font-weight:700;color:var(--text-1);margin-bottom:6px;}
.shop-bio{font-size:13px;color:var(--text-2);line-height:1.7;white-space:pre-wrap;}
.shop-bio.empty{color:var(--text-3);font-style:italic;}
.shop-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.status-badge{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block;font-weight:600;}
.status-active{background:#d1fae5;color:#065f46;}
.status-suspended{background:#fff3cd;color:#856404;}
.status-pending{background:#ffe4b5;color:#b76500;}
.pending-note{margin-top:10px;padding:10px 12px;background:#fffdf5;border:1px solid #ffd580;border-radius:8px;font-size:12px;color:#7a5200;line-height:1.7;}

/* modal */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9995;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;}
.confirm-overlay.active{display:flex;}
.confirm-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:24px;max-width:460px;width:100%;max-height:calc(100dvh - 48px);overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.18);}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:6px;color:var(--text-1);}
.confirm-sub{font-size:12px;color:var(--text-3);margin-bottom:14px;}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
.btn-back-confirm{padding:10px 18px;background:#fff;border:1px solid var(--border-s);border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--text-2);}
.btn-do-submit{padding:10px 20px;background:var(--rose);border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;color:#fff;}
.btn-do-submit:disabled{opacity:.5;cursor:not-allowed;}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(40,40,40,.96);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.img-preview{max-width:120px;max-height:160px;border-radius:8px;object-fit:cover;margin-top:8px;display:block;}
.img-drop{border:1.5px dashed var(--rose-border);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;background:var(--rose-bg);font-size:12px;color:var(--text-2);}
.img-drop:hover{background:rgba(181,98,122,.1);}
.img-drop input{display:none;}
.img-actions{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;}

@media(max-width:640px){.main-wrap{padding:14px 10px 60px;}.card{padding:18px 14px;}.shop-img,.shop-img-placeholder{width:60px;height:80px;}#chat-grid{grid-template-columns:1fr !important;}#chat-inbox-col{max-height:220px !important;}}
/* chat inbox rows */
.ci-row{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;background:#fff;transition:background .15s;}
.ci-row:hover{background:var(--bg-3);}
.ci-row.active{background:var(--rose-bg);border-left:3px solid var(--rose);}
.ci-row-top{display:flex;justify-content:space-between;align-items:center;gap:6px;font-size:11px;color:var(--text-3);margin-bottom:3px;}
.ci-row-msg{font-size:12px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ci-unread{background:var(--rose);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:700;}
.msg-bubble{max-width:80%;padding:8px 12px;border-radius:12px;margin-bottom:8px;word-wrap:break-word;white-space:pre-wrap;}
.msg-visitor{background:#eef3ff;color:#1a1a1a;border-bottom-left-radius:4px;align-self:flex-start;}
.msg-shop{background:var(--rose);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;margin-left:auto;}
.msg-meta{font-size:10px;color:var(--text-3);margin-top:2px;}
#chat-msgs{display:flex;flex-direction:column;}
</style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div class="login-wrap" id="login-wrap">
    <div class="logo">YobuHo — <em>Cast</em></div>
    <div class="logo-sub">Cast Admin</div>
    <div class="card login-card" id="login-card">
        <div class="card-title">キャストログイン</div>
        <div class="f-group">
            <label for="login-email" class="f-label">メールアドレス</label>
            <input type="email" id="login-email" class="f-input" autocomplete="username" placeholder="cast@example.com">
        </div>
        <div class="f-group">
            <label for="login-pw" class="f-label">パスワード</label>
            <input type="password" id="login-pw" class="f-input" autocomplete="current-password" placeholder="8文字以上">
            <label class="pw-toggle"><input type="checkbox" id="login-pw-show"> パスワードを表示</label>
        </div>
        <button type="button" class="btn-primary" id="login-btn" onclick="doLogin()">ログイン</button>
        <div class="err-msg" id="login-err"></div>
        <div style="font-size:11px;color:var(--text-3);margin-top:20px;padding-top:14px;border-top:1px solid var(--border);line-height:1.7;">
            招待メールを受け取った方は、メール内のリンクからパスワードを設定してください。まだ招待を受けていない方は、所属店舗様にご連絡ください。
        </div>
    </div>
</div>

<!-- ===== 本体 ===== -->
<div id="app-wrap" style="display:none;">
    <div class="hdr">
        <div class="hdr-left">
            <div class="hdr-logo">YobuHo <em>Cast</em></div>
            <div class="hdr-email" id="hdr-email">—</div>
        </div>
        <button type="button" class="btn btn-logout" onclick="doLogout()">ログアウト</button>
    </div>

    <div class="main-wrap">
        <div class="tabs">
            <button type="button" class="tab-btn active" id="tab-btn-shops" onclick="switchTab('shops')">所属店舗</button>
            <button type="button" class="tab-btn" id="tab-btn-chat" onclick="switchTab('chat')">💬 チャット</button>
            <button type="button" class="tab-btn" id="tab-btn-settings" onclick="switchTab('settings')">設定</button>
        </div>

        <!-- 所属店舗タブ -->
        <div class="tab-content active" id="tab-shops">
            <div id="shops-loading" style="padding:40px;text-align:center;color:var(--text-3);font-size:13px;">読み込み中…</div>
            <div id="shops-empty" style="display:none;" class="card">
                <div style="text-align:center;padding:20px;color:var(--text-3);font-size:13px;line-height:1.8;">
                    現在、所属している店舗がありません。<br>招待を受けた店舗様にご確認ください。
                </div>
            </div>
            <div id="shops-list"></div>
        </div>

        <!-- チャットタブ -->
        <div class="tab-content" id="tab-chat">
            <div id="chat-empty" style="display:none;" class="card">
                <div style="text-align:center;padding:20px;color:var(--text-3);font-size:13px;line-height:1.8;">
                    まだ承認済みの店舗がありません。<br>店舗オーナーの承認後にチャット機能が使えます。
                </div>
            </div>
            <div id="chat-shop-select" class="card" style="display:none;">
                <div class="card-title">📍 店舗を選ぶ</div>
                <div id="chat-shop-buttons" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
            </div>
            <div id="chat-pane" class="card" style="display:none;">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
                    <div>
                        <div class="card-title" id="chat-pane-shop-name" style="margin-bottom:2px;">—</div>
                        <div style="font-size:11px;color:var(--text-3);">キャスト: <span id="chat-pane-cast-name">—</span></div>
                    </div>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <label class="pw-toggle" style="margin:0;min-height:auto;gap:6px;">
                            <input type="checkbox" id="chat-online-toggle">
                            <span style="font-size:12px;color:var(--text-2);">受付中</span>
                        </label>
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:240px 1fr;gap:12px;min-height:420px;" id="chat-grid">
                    <div id="chat-inbox-col" style="border:1px solid var(--border);border-radius:8px;background:var(--bg-3);overflow-y:auto;max-height:520px;"></div>
                    <div style="display:flex;flex-direction:column;gap:8px;min-height:420px;">
                        <div id="chat-msgs" style="flex:1;border:1px solid var(--border);border-radius:8px;background:#fff;padding:12px;overflow-y:auto;max-height:460px;min-height:320px;font-size:13px;line-height:1.6;"></div>
                        <div style="display:flex;gap:6px;">
                            <textarea id="chat-input" class="f-input" rows="2" placeholder="メッセージを入力…" style="flex:1;min-height:48px;"></textarea>
                            <button type="button" class="btn primary" id="chat-send-btn" onclick="castChatSend()" style="padding:10px 16px;">送信</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 設定タブ -->
        <div class="tab-content" id="tab-settings">
            <div class="card">
                <div class="card-title">🔒 パスワード変更</div>
                <div class="f-group">
                    <label class="f-label">現在のパスワード</label>
                    <input type="password" id="pw-old" class="f-input" autocomplete="current-password">
                </div>
                <div class="f-group">
                    <label class="f-label">新しいパスワード</label>
                    <input type="password" id="pw-new" class="f-input" autocomplete="new-password" placeholder="8文字以上">
                </div>
                <div class="f-group">
                    <label class="f-label">新しいパスワード（確認）</label>
                    <input type="password" id="pw-new2" class="f-input" autocomplete="new-password">
                    <label class="pw-toggle"><input type="checkbox" id="pw-change-show"> パスワードを表示</label>
                </div>
                <button type="button" class="btn primary" id="pw-change-btn" onclick="changePassword()">パスワードを変更</button>
            </div>

            <div class="card">
                <div class="card-title">📧 メールアドレス変更</div>
                <div style="font-size:12px;color:var(--text-3);margin-bottom:12px;">現在: <strong id="current-email-val">—</strong></div>
                <div class="f-group">
                    <label class="f-label">新しいメールアドレス</label>
                    <input type="email" id="email-new" class="f-input" autocomplete="off">
                </div>
                <div class="f-group">
                    <label class="f-label">パスワード（確認）</label>
                    <input type="password" id="email-pw" class="f-input" autocomplete="current-password">
                </div>
                <button type="button" class="btn primary" id="email-change-btn" onclick="changeEmail()">メールアドレスを変更</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== プロフィール編集モーダル ===== -->
<div class="confirm-overlay" id="profile-modal">
    <div class="confirm-card">
        <div class="confirm-title">✏️ プロフィール編集</div>
        <div class="confirm-sub" id="profile-modal-shop">—</div>
        <div class="f-group">
            <label class="f-label">源氏名</label>
            <input type="text" id="pm-name" class="f-input" maxlength="100">
        </div>
        <div class="f-group">
            <label class="f-label">自己紹介（任意・500文字まで）</label>
            <textarea id="pm-bio" class="f-input" maxlength="500" rows="5" placeholder="お客様に見えるメッセージです。"></textarea>
        </div>
        <div class="f-group">
            <label class="f-label">プロフィール画像（任意）</label>
            <label class="img-drop" id="pm-img-drop">
                <span id="pm-img-label">📷 タップして画像を選択（JPG/PNG・500KBまで）</span>
                <input type="file" id="pm-img-input" accept="image/*">
            </label>
            <img id="pm-img-preview" class="img-preview" style="display:none;">
            <div class="img-actions" id="pm-img-actions" style="display:none;">
                <button type="button" class="btn" onclick="clearProfileImage()">画像を削除</button>
            </div>
        </div>
        <div class="confirm-btns">
            <button type="button" class="btn-back-confirm" onclick="closeProfileModal()">キャンセル</button>
            <button type="button" class="btn-do-submit" id="pm-save-btn" onclick="saveProfileModal()">保存</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== 共通ヘルパー ==========
const SESSION_KEY = 'cast_admin_session';
let currentCast = null;
let shopsCache = [];
let editingShopCastId = null;
let editingImageDataUrl = null;
let editingImageCleared = false;

function toast(msg, d = 2500){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), d);
}
function esc(s){ return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

async function api(action, body = null, method = 'POST'){
    const url = '/api/cast-auth.php?action=' + encodeURIComponent(action);
    const opts = { method, credentials: 'include' };
    if (method === 'POST') {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = JSON.stringify(body || {});
    }
    let res;
    try { res = await fetch(url, opts); } catch (e) { throw new Error('通信エラー'); }
    let data;
    try { data = await res.json(); } catch (e) { throw new Error('サーバー応答が不正です'); }
    if (!res.ok || data.error) throw new Error(data.error || 'エラーが発生しました');
    return data;
}

// ========== ログイン ==========
async function doLogin(){
    const err = document.getElementById('login-err');
    err.style.display = 'none';
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-pw').value;
    if (!email || !pw) { err.textContent = 'メールアドレスとパスワードを入力してください'; err.style.display = 'block'; return; }
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'ログイン中…';
    try {
        const data = await api('login', { email, password: pw });
        currentCast = data.cast;
        try { localStorage.setItem(SESSION_KEY, '1'); } catch (e) {}
        showApp();
    } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'ログイン';
    }
}

async function doLogout(){
    if (!confirm('ログアウトしますか？')) return;
    try { await api('logout', {}); } catch (e) {}
    try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
    location.reload();
}

function showApp(){
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('app-wrap').style.display = 'block';
    document.getElementById('hdr-email').textContent = currentCast?.email || '';
    document.getElementById('current-email-val').textContent = currentCast?.email || '—';
    loadProfile();
}

// ========== 起動時セッション確認 ==========
(async () => {
    try {
        const res = await fetch('/api/cast-auth.php?action=check', { credentials: 'include' });
        const data = await res.json();
        if (data.authenticated && data.cast) {
            currentCast = data.cast;
            showApp();
            return;
        }
    } catch (e) {}
    try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
})();

async function loadProfile(){

    const empty = document.getElementById('shops-empty');
    const list = document.getElementById('shops-list');
    loading.style.display = 'block';
    empty.style.display = 'none';

    try {
        const data = await api('profile', null, 'GET');
        currentCast = data.cast;
        shopsCache = data.shops || [];

function renderShops(shops){
    const list = document.getElementById('shops-list');
    const modePath = { men: '/deli', women: '/jofu', este: '/este', men_same: '/same-m', women_same: '/same-f' };
    list.innerHTML = shops.map(s => {
        const imgHtml = s.profile_image_url
            ? '<img class="shop-img" src="' + esc(s.profile_image_url) + '" alt="' + esc(s.display_name) + '">'
            : '<div class="shop-img-placeholder">👤</div>';
        const isPending = s.status === 'pending_approval';
        let statusClass, statusLabel;
        if (isPending) { statusClass = 'status-pending'; statusLabel = '⏳ 店舗の承認待ち'; }
        else if (s.status === 'active') { statusClass = 'status-active'; statusLabel = '掲載中'; }
        else { statusClass = 'status-suspended'; statusLabel = '一時停止中'; }
        const bio = s.bio
            ? '<div class="shop-bio">' + esc(s.bio) + '</div>'
            : '<div class="shop-bio empty">（自己紹介が未設定）</div>';
        const shopUrl = (!isPending && s.slug && modePath[s.gender_mode]) ? (modePath[s.gender_mode] + '/shop/' + encodeURIComponent(s.slug) + '/') : null;
        const shopLink = shopUrl ? '<a href="' + shopUrl + '" target="_blank" rel="noopener" class="btn" style="font-size:12px;">🔗 店舗ページ</a>' : '';
        const pendingNote = isPending
            ? '<div class="pending-note">店舗オーナーの承認をお待ちください。承認されるとチャット受付やプロフィール公開が有効になります。<br>プロフィールは今のうちに準備しておけます。</div>'
            : '';
        const castChatUrl = (!isPending && s.slug) ? ('https://yobuho.com/chat/' + encodeURIComponent(s.slug) + '/?cast=' + encodeURIComponent(s.shop_cast_id)) : null;
        const castUrlBlock = castChatUrl
            ? '<div class="cast-url-block" style="margin-top:10px;padding:10px 12px;background:#fff8f0;border:1px solid #f5d6b3;border-radius:8px;">'
            +   '<div style="font-size:11px;color:#8a5a2a;font-weight:600;margin-bottom:6px;">📌 あなたの指名チャットURL</div>'
            +   '<div style="display:flex;gap:6px;align-items:center;">'
            +     '<input type="text" readonly value="' + esc(castChatUrl) + '" id="cast-url-' + esc(s.shop_cast_id) + '" style="flex:1;min-width:0;padding:6px 8px;border:1px solid #e5c8a3;border-radius:6px;font-size:11px;background:#fff;font-family:monospace;">'
            +     '<button type="button" class="btn" onclick="copyCastUrl(\'' + esc(s.shop_cast_id) + '\')" style="font-size:11px;padding:6px 10px;white-space:nowrap;">📋 コピー</button>'
            +   '</div>'
            +   '<div style="font-size:10px;color:#8a5a2a;margin-top:6px;line-height:1.5;">このURLをSNSプロフィール等に貼ると、お客様から直接あなたへチャットが届きます。</div>'
            + '</div>'
            : '';
        const notifyBlock = (!isPending)
            ? renderNotifyToggle(s.shop_cast_id, s.chat_notify_mode || 'off')
            : '';
        return ''
            + '<div class="shop-card">'
            +   '<div class="shop-card-hdr">'
            +     imgHtml
            +     '<div class="shop-body">'
            +       '<div class="shop-meta">' + esc(s.shop_name) + ' <span class="status-badge ' + statusClass + '">' + statusLabel + '</span></div>'
            +       '<div class="shop-display-name">' + esc(s.display_name) + '</div>'
            +       bio
            +       pendingNote
            +       castUrlBlock
            +       notifyBlock
            +       '<div class="shop-actions">'
            +         '<button type="button" class="btn primary" onclick="openProfileModal(\'' + esc(s.shop_cast_id) + '\')" style="font-size:12px;padding:8px 14px;">✏️ プロフィール編集</button>'
            +         shopLink
            +       '</div>'
            +     '</div>'
            +   '</div>'
            + '</div>';
    }).join('');
}

function renderNotifyToggle(shopCastId, mode){
    const sid = esc(shopCastId);
    const opts = [
        { v: 'off',   label: 'OFF' },
        { v: 'first', label: '初回のみ' },
        { v: 'every', label: '毎回' },
    ];
    const btns = opts.map(o => {
        const active = (o.v === mode);
        const bg = active ? 'var(--rose)' : '#fff';
        const color = active ? '#fff' : 'var(--text-2)';
        const border = active ? 'var(--rose)' : 'var(--border-s)';
        const fw = active ? '700' : '500';
        return '<button type="button" class="notify-seg" data-mode="' + o.v + '" onclick="setCastNotifyMode(\'' + sid + '\',\'' + o.v + '\')" style="padding:6px 10px;font-size:12px;border:1px solid ' + border + ';background:' + bg + ';color:' + color + ';font-weight:' + fw + ';cursor:pointer;border-radius:6px;font-family:inherit;">' + o.label + '</button>';
    }).join('');
    return ''
        + '<div style="margin-top:10px;padding:10px 12px;background:var(--rose-bg);border:1px solid var(--rose-border);border-radius:8px;">'
        +   '<div style="font-size:11px;color:var(--rose-dim);font-weight:600;margin-bottom:6px;">📧 新着メッセージのメール通知</div>'
        +   '<div id="notify-seg-' + sid + '" style="display:flex;gap:6px;flex-wrap:wrap;">' + btns + '</div>'
        +   '<div style="font-size:10px;color:var(--text-3);margin-top:6px;line-height:1.5;">「初回のみ」はセッション開始の1通目だけ。「毎回」は新着ごとに通知（頻度注意）。</div>'
        + '</div>';
}

async function setCastNotifyMode(shopCastId, mode){
    const container = document.getElementById('notify-seg-' + shopCastId);
    if (!container) return;
    const prevActive = container.querySelector('.notify-seg[data-mode]');
    // 楽観更新
    container.querySelectorAll('.notify-seg').forEach(btn => {
        const active = (btn.dataset.mode === mode);
        btn.style.background = active ? 'var(--rose)' : '#fff';
        btn.style.color = active ? '#fff' : 'var(--text-2)';
        btn.style.borderColor = active ? 'var(--rose)' : 'var(--border-s)';
        btn.style.fontWeight = active ? '700' : '500';
    });
    try {
        await castChatApi('toggle-notify', { shop_cast_id: shopCastId, mode });
        const labels = { off: 'OFF', first: '初回のみ', every: '毎回' };
        toast('✅ メール通知: ' + labels[mode]);
        const s = shopsCache.find(x => x.shop_cast_id === shopCastId);
        if (s) s.chat_notify_mode = mode;
    } catch (e) {
        toast('⚠️ ' + e.message);
        // 失敗時はrender再描画
        renderShops(shopsCache);
    }
}

function copyCastUrl(shopCastId){
    const input = document.getElementById('cast-url-' + shopCastId);
    if (!input) return;
    input.select();
    input.setSelectionRange(0, 9999);
    try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(input.value).then(
                () => toast('✅ URLをコピーしました'),
                () => { document.execCommand('copy'); toast('✅ URLをコピーしました'); }
            );
        } else {
            document.execCommand('copy');
            toast('✅ URLをコピーしました');
        }
    } catch (e) {
        toast('⚠️ コピーに失敗しました。手動で選択してコピーしてください');
    }
}

function clearProfileImage(){
    editingImageDataUrl = null;
    editingImageCleared = true;
    document.getElementById('pm-img-preview').style.display = 'none';
    document.getElementById('pm-img-actions').style.display = 'none';
    document.getElementById('pm-img-input').value = '';
    document.getElementById('pm-img-label').textContent = '📷 タップして画像を選択（JPG/PNG・500KBまで）';
}
document.getElementById('pm-img-input').addEventListener('change', function(e){
    const file = this.files && this.files[0];
    if (!file) return;
    if (!/^image\/(jpeg|png|webp|gif)$/i.test(file.type)) { toast('⚠️ 画像形式はJPG/PNG/WebP/GIFのみ'); this.value = ''; return; }
    if (file.size > 500 * 1024) { toast('⚠️ 画像は500KB以下にしてください'); this.value = ''; return; }
    const reader = new FileReader();
    reader.onload = ev => {
        editingImageDataUrl = ev.target.result;
        editingImageCleared = false;
        const preview = document.getElementById('pm-img-preview');
        preview.src = editingImageDataUrl;
        preview.style.display = 'block';
        document.getElementById('pm-img-actions').style.display = 'flex';
        document.getElementById('pm-img-label').textContent = '📷 タップして画像を変更';
    };
    reader.readAsDataURL(file);
});

// ========== チャットタブ ==========
const CHAT_POLL_MS = 4000;
let chatState = {
    shopCastId: null,       // 現在選択中の shop_cast_id
    shopName: null,
    castName: null,
    sessionId: 0,           // 現在開いているセッション
    sinceId: 0,             // 受信済みの最大メッセージID
    pollTimer: null,
    lastOnline: false,
    sending: false,
};

async function castChatApi(action, body = null, method = 'POST'){
    const url = '/api/cast-chat-api.php?action=' + encodeURIComponent(action);
    const opts = { method, credentials: 'include' };
    if (method === 'POST') {
        opts.headers = { 'Content-Type': 'application/json' };
        opts.body = JSON.stringify(body || {});
    }
    let res;
    try { res = await fetch(url, opts); } catch (e) { throw new Error('通信エラー'); }
    let data;
    try { data = await res.json(); } catch (e) { throw new Error('サーバー応答が不正です'); }
    if (!res.ok || data.error) throw new Error(data.error || 'エラーが発生しました');
    return data;
}

function renderChatShopSelect(){
    const approvedShops = (shopsCache || []).filter(s => s.status === 'active');
    const empty = document.getElementById('chat-empty');
    const select = document.getElementById('chat-shop-select');
    const pane = document.getElementById('chat-pane');
    if (!approvedShops.length) {
        empty.style.display = 'block';
        select.style.display = 'none';
        pane.style.display = 'none';
        return;
    }
    empty.style.display = 'none';
    // 1店舗のみなら選択スキップして直接表示
    if (approvedShops.length === 1) {
        select.style.display = 'none';
        openChatForShop(approvedShops[0].shop_cast_id);
        return;
    }
    select.style.display = 'block';
    const buttons = document.getElementById('chat-shop-buttons');
    buttons.innerHTML = approvedShops.map(s =>
        '<button type="button" class="btn" onclick="openChatForShop(\'' + esc(s.shop_cast_id) + '\')" style="font-size:12px;">' + esc(s.shop_name) + '</button>'
    ).join('');
    // すでに開いている pane があれば残す
    if (chatState.shopCastId) pane.style.display = 'block';
}

async function openChatForShop(shopCastId){
    const s = shopsCache.find(x => x.shop_cast_id === shopCastId);
    if (!s) { toast('⚠️ 店舗情報が見つかりません'); return; }
    if (s.status !== 'active') { toast('⚠️ 承認待ちの店舗です'); return; }
    stopChatPoll();
    chatState.shopCastId = shopCastId;
    chatState.shopName = s.shop_name;
    chatState.castName = s.display_name;
    chatState.sessionId = 0;
    chatState.sinceId = 0;
    document.getElementById('chat-pane').style.display = 'block';
    document.getElementById('chat-pane-shop-name').textContent = s.shop_name;
    document.getElementById('chat-pane-cast-name').textContent = s.display_name || '—';
    document.getElementById('chat-inbox-col').innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-3);font-size:12px;">読み込み中…</div>';
    document.getElementById('chat-msgs').innerHTML = '';
    await loadChatInbox(false);
    startChatPoll();
}

async function loadChatInbox(quiet){
    if (!chatState.shopCastId) return;
    try {
        const data = await castChatApi('inbox', { shop_cast_id: chatState.shopCastId, session_id: chatState.sessionId, since_id: chatState.sinceId }, 'POST');
        renderChatInbox(data.sessions || []);
        applyChatBatch(data);
        // online toggle 同期
        document.getElementById('chat-online-toggle').checked = !!data.shop_online;
        chatState.lastOnline = !!data.shop_online;
    } catch (e) {
        if (!quiet) toast('⚠️ ' + e.message);
    }
}

function renderChatInbox(sessions){
    const col = document.getElementById('chat-inbox-col');
    if (!sessions.length) {
        col.innerHTML = '<div style="padding:24px 12px;text-align:center;color:var(--text-3);font-size:12px;line-height:1.7;">まだチャットはありません。<br>店舗ページから「キャスト指名」で来訪されたお客様がここに表示されます。</div>';
        return;
    }
    col.innerHTML = sessions.map(s => {
        const name = s.nickname || 'ゲスト';
        const preview = (s.last_message || '(メッセージなし)').slice(0, 30);
        const sender = s.last_sender === 'shop' ? '→ ' : '';
        const unread = parseInt(s.unread_count || 0) > 0 ? '<span class="ci-unread">' + s.unread_count + '</span>' : '';
        const active = parseInt(s.id) === chatState.sessionId ? 'active' : '';
        const when = s.last_activity_at ? formatRelTime(s.last_activity_at) : '';
        return '<div class="ci-row ' + active + '" onclick="openChatSession(' + parseInt(s.id) + ')">'
             + '<div class="ci-row-top"><span>' + esc(name) + '</span><span>' + esc(when) + '</span></div>'
             + '<div class="ci-row-msg">' + esc(sender) + esc(preview) + '</div>'
             + (unread ? '<div style="margin-top:3px;">' + unread + '</div>' : '')
             + '</div>';
    }).join('');
}

function formatRelTime(iso){
    try {
        const d = new Date(iso.replace(' ', 'T'));
        const diff = (Date.now() - d.getTime()) / 1000;
        if (diff < 60) return 'たった今';
        if (diff < 3600) return Math.floor(diff/60) + '分前';
        if (diff < 86400) return Math.floor(diff/3600) + '時間前';
        return Math.floor(diff/86400) + '日前';
    } catch (e) { return ''; }
}

async function openChatSession(sessionId){
    chatState.sessionId = sessionId;
    chatState.sinceId = 0;
    document.getElementById('chat-msgs').innerHTML = '<div style="color:var(--text-3);font-size:12px;">読み込み中…</div>';
    await loadChatInbox(false);
}

function applyChatBatch(data){
    const msgs = data.messages || [];
    if (!msgs.length) return;
    const box = document.getElementById('chat-msgs');
    // 初回読み込み時は空に
    if (chatState.sinceId === 0) box.innerHTML = '';
    for (const m of msgs) {
        const cls = m.sender_type === 'shop' ? 'msg-bubble msg-shop' : 'msg-bubble msg-visitor';
        const bubble = document.createElement('div');
        bubble.className = cls;
        bubble.textContent = m.message;
        box.appendChild(bubble);
        if (parseInt(m.id) > chatState.sinceId) chatState.sinceId = parseInt(m.id);
    }
    box.scrollTop = box.scrollHeight;
}

function startChatPoll(){
    stopChatPoll();
    chatState.pollTimer = setInterval(() => { loadChatInbox(true); }, CHAT_POLL_MS);
}
function stopChatPoll(){
    if (chatState.pollTimer) clearInterval(chatState.pollTimer);
    chatState.pollTimer = null;
}

async function castChatSend(){
    if (chatState.sending) return;
    if (!chatState.sessionId) { toast('⚠️ 送信先のセッションを選んでください'); return; }
    const ta = document.getElementById('chat-input');
    const msg = ta.value.trim();
    if (!msg) return;
    chatState.sending = true;
    const btn = document.getElementById('chat-send-btn');
    btn.disabled = true; btn.textContent = '送信中…';
    try {
        const cmid = 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        const data = await castChatApi('reply', { session_id: chatState.sessionId, message: msg, client_msg_id: cmid, since_id: chatState.sinceId });
        ta.value = '';
        applyChatBatch(data);
    } catch (e) {
        toast('⚠️ ' + e.message);
    } finally {
        chatState.sending = false;
        btn.disabled = false; btn.textContent = '送信';
    }
}

document.getElementById('chat-online-toggle').addEventListener('change', async function(){
    if (!chatState.shopCastId) return;
    const on = this.checked;
    try {
        await castChatApi('toggle-online', { shop_cast_id: chatState.shopCastId, on });
        toast(on ? '✅ 受付を開始しました' : '⏸ 受付を停止しました');
        chatState.lastOnline = on;
    } catch (e) {
        this.checked = chatState.lastOnline;
        toast('⚠️ ' + e.message);
    }
});

// Enterで送信（Shift+Enterは改行）
document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        castChatSend();
    }
});

// タブ切替で初期化: chatタブ開いたら shopsCache から再描画
const origSwitchTab = switchTab;
switchTab = function(name){
    origSwitchTab(name);
    if (name === 'chat') {
        renderChatShopSelect();
    } else {
        stopChatPoll();
    }
};

document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
