<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title id="page-title">店舗ページ | YobuHo</title>
    <meta name="description" id="page-desc" content="">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --rose:#b05570;--rose-dim:#8e3f56;--rose-bg:rgba(176,85,112,0.08);--rose-border:rgba(176,85,112,0.25);
            --gold:#c9a84c;--gold-bg:rgba(201,168,76,0.08);--gold-border:rgba(201,168,76,0.25);
            --bg:#0a0a0f;--bg-2:#111118;--bg-3:#1a1a24;--bg-4:#22222e;
            --border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.15);
            --text:#f0ede8;--text-2:rgba(240,237,232,0.7);--text-3:rgba(240,237,232,0.4);
            --red:#c05050;--green:#3a9a60;
            --r:10px;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

        /* ===== ヘッダー ===== */
        .hdr{background:var(--bg-2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
        .hdr-inner{max-width:800px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px;}
        .hdr-logo{font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:300;color:var(--gold);letter-spacing:0.08em;text-decoration:none;}
        .hdr-logo em{font-style:italic;font-weight:600;}

        /* ===== メイン ===== */
        .main{max-width:800px;margin:0 auto;padding:20px;}

        /* ===== 店舗ヘッダーカード ===== */
        .shop-header{background:linear-gradient(135deg,var(--bg-2) 0%,rgba(176,85,112,0.06) 100%);border:1px solid var(--border);border-radius:14px;padding:28px 24px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
        .shop-name{font-size:24px;font-weight:700;margin-bottom:10px;line-height:1.4;}
        .genre-badge{display:inline-block;padding:4px 14px;border-radius:12px;font-size:11px;font-weight:700;background:var(--rose-bg);color:var(--rose);border:1px solid var(--rose-border);}
        .shop-contact{margin-top:16px;display:flex;flex-direction:column;gap:8px;font-size:14px;color:var(--text-2);}
        .shop-contact a{color:var(--rose);text-decoration:none;word-break:break-all;}
        .shop-contact a:hover{text-decoration:underline;}

        /* ===== フィルター ===== */
        .filter-bar{margin-bottom:16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
        .filter-select{padding:8px 12px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer;}
        .filter-select:focus{border-color:var(--rose);}
        .filter-count{font-size:12px;color:var(--text-3);}

        /* ===== ホテルカード ===== */
        .hotel-card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.12);transition:border-color 0.15s;}
        .hotel-card:hover{border-color:var(--border-s);}
        .hotel-name{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.4;}
        .hotel-meta{font-size:12px;color:var(--text-3);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
        .hotel-status{display:inline-block;padding:3px 12px;border-radius:12px;font-size:11px;font-weight:700;margin:8px 0;}
        .status-can{background:rgba(58,154,96,0.1);color:var(--green);border:1px solid rgba(58,154,96,0.25);}
        .status-cannot{background:rgba(192,80,80,0.08);color:var(--red);border:1px solid rgba(192,80,80,0.2);}
        .hotel-details{margin-top:10px;display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--text-2);}
        .hotel-details .detail-label{color:var(--text-3);min-width:60px;}

        /* ===== 口コミカード ===== */
        .report-card{background:var(--bg-3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:8px;}
        .report-date{font-size:11px;color:var(--text-3);font-weight:700;}
        .report-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
        .report-tag{padding:2px 7px;border-radius:8px;font-size:10px;}
        .tag-can{background:rgba(58,154,96,0.1);border:1px solid rgba(58,154,96,0.3);color:var(--green);}
        .tag-cannot{background:rgba(192,80,80,0.08);border:1px solid rgba(192,80,80,0.25);color:var(--red);}
        .tag-meta{background:var(--bg-4);border:1px solid var(--border);color:var(--text-2);}
        .report-comment{font-size:12px;color:var(--text-2);line-height:1.6;margin-top:6px;}

        /* ===== ポータルリンクボタン ===== */
        .portal-link{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;background:var(--rose-bg);border:1px solid var(--rose-border);border-radius:var(--r);color:var(--rose);font-size:11px;font-weight:600;text-decoration:none;transition:all 0.15s;margin-top:8px;}
        .portal-link:hover{background:var(--rose);color:#fff;border-color:var(--rose);}

        /* ===== フッター ===== */
        .footer{max-width:800px;margin:40px auto 0;padding:24px 20px;text-align:center;border-top:1px solid var(--border);}
        .footer a{color:var(--rose);text-decoration:none;font-size:13px;margin:0 12px;}
        .footer a:hover{text-decoration:underline;}
        .footer-copy{font-size:11px;color:var(--text-3);margin-top:12px;}

        /* ===== エラーページ ===== */
        .error-page{text-align:center;padding:80px 20px;}
        .error-page h2{font-size:20px;margin-bottom:12px;}
        .error-page p{color:var(--text-3);font-size:14px;margin-bottom:20px;}
        .error-page a{color:var(--rose);text-decoration:none;}
        .error-page a:hover{text-decoration:underline;}

        .empty-msg{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;}

        @media(max-width:500px){
            .main{padding:12px;}
            .shop-header{padding:20px 16px;}
            .shop-name{font-size:20px;}
            .hotel-card{padding:14px;}
        }
    </style>
</head>
<body>
<div class="hdr">
    <div class="hdr-inner">
        <a href="https://yobuho.com/" class="hdr-logo"><em>Deri</em> Hotel Navi</a>
    </div>
</div>

<div class="main" id="main">
    <div class="empty-msg" id="loading">読み込み中...</div>
</div>

<div class="footer" id="footer" style="display:none;">
    <a href="https://yobuho.com/shop-register.html">YobuHoに掲載しませんか？</a>
    <a href="https://yobuho.com/">ホテルを探す</a>
    <div class="footer-copy">&copy; YobuHo</div>
</div>

<script>
const SB_URL="https://ojkhwbvoaiaqekxrbpdd.supabase.co";
const SB_KEY="sb_publishable_UqlcQo5CdoPB_1s1ouLX9Q_olbwArKB";
const sb=supabase.createClient(SB_URL,SB_KEY);
const GENRE_LABELS={men:"男性向け（デリヘル）",women:"女性向け（女性用風俗）",men_same:"男性同士向け",women_same:"女性同士向け"};
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function formatDate(d){if(!d)return"";const dt=new Date(d);return`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,"0")}/${String(dt.getDate()).padStart(2,"0")}`;}

let shopData=null;
let hotelInfos=[];
let hotelMap={};
let reportsMap={};
let serviceMap={};
let isPaid=false;

(async function init(){
    const params=new URLSearchParams(window.location.search);
    const shopId=params.get("id");
    const main=document.getElementById("main");

    if(!shopId){
        main.innerHTML='<div class="error-page"><h2>ページが見つかりません</h2><p>店舗IDが指定されていません。</p><a href="https://yobuho.com/">トップへ戻る</a></div>';
        return;
    }

    // 店舗情報取得
    const{data:shop,error}=await sb.from("shops").select("*,contract_plans(name,price)").eq("id",shopId).eq("status","active").single();
    if(error||!shop){
        main.innerHTML='<div class="error-page"><h2>この店舗は現在掲載されていません</h2><p>掲載が停止または審査中のため、現在閲覧できません。</p><a href="https://yobuho.com/">トップへ戻る</a></div>';
        return;
    }
    shopData=shop;
    isPaid=shop.contract_plans&&Number(shop.contract_plans.price)>0;

    // SEO
    document.getElementById("page-title").textContent=`${shop.shop_name} | YobuHo`;
    document.getElementById("page-desc").content=`${shop.shop_name}の対応ホテル情報 - YobuHo`;

    // ホテル情報取得
    const{data:infos}=await sb.from("shop_hotel_info").select("*").eq("shop_id",shopId).order("updated_at",{ascending:false});
    hotelInfos=infos||[];

    if(hotelInfos.length>0){
        // ホテル詳細取得
        const hotelIds=[...new Set(hotelInfos.map(h=>h.hotel_id))];
        const{data:hotels}=await sb.from("hotels").select("id,name,address,nearest_station,min_charge,prefecture").in("id",hotelIds);
        (hotels||[]).forEach(h=>{hotelMap[h.id]=h;});

        // この店舗の投稿取得
        const{data:reports}=await sb.from("reports").select("*").eq("shop_id",shopId).eq("poster_type","shop").order("created_at",{ascending:false});
        (reports||[]).forEach(r=>{
            if(!reportsMap[r.hotel_id])reportsMap[r.hotel_id]=[];
            reportsMap[r.hotel_id].push(r);
        });

        // サービス情報取得
        const infoIds=hotelInfos.map(h=>h.id);
        const{data:services}=await sb.from("shop_hotel_services").select("*,shop_service_options(name)").in("shop_hotel_info_id",infoIds);
        (services||[]).forEach(s=>{
            if(!serviceMap[s.shop_hotel_info_id])serviceMap[s.shop_hotel_info_id]=[];
            if(s.shop_service_options?.name)serviceMap[s.shop_hotel_info_id].push(s.shop_service_options.name);
        });
    }

    render();
    document.getElementById("footer").style.display="";
})();

function render(prefFilter){
    const main=document.getElementById("main");
    const shop=shopData;

    // 店舗ヘッダー
    let contactHtml="";
    if(isPaid){
        if(shop.shop_tel)contactHtml+=`<div>📞 ${esc(shop.shop_tel)}</div>`;
        if(shop.shop_url)contactHtml+=`<div>🌐 <a href="${esc(shop.shop_url)}" target="_blank" rel="noopener">${esc(shop.shop_url)}</a></div>`;
    }

    // 都道府県リスト取得
    const prefs=[...new Set(hotelInfos.map(info=>{const h=hotelMap[info.hotel_id];return h?h.prefecture:null;}).filter(Boolean))].sort();

    // フィルタリング
    let filtered=hotelInfos;
    if(prefFilter){
        filtered=hotelInfos.filter(info=>{const h=hotelMap[info.hotel_id];return h&&h.prefecture===prefFilter;});
    }

    // フィルターバー
    const filterHtml=prefs.length>1?`
        <div class="filter-bar">
            <select class="filter-select" id="pref-filter" onchange="render(this.value||null)">
                <option value="">全エリア</option>
                ${prefs.map(p=>`<option value="${esc(p)}"${p===prefFilter?' selected':''}>${esc(p)}</option>`).join("")}
            </select>
            <span class="filter-count">${filtered.length} / ${hotelInfos.length} 件</span>
        </div>
    `:"";

    // ホテルカード生成
    const cardsHtml=filtered.map(info=>{
        const hotel=hotelMap[info.hotel_id];
        if(!hotel)return"";

        const statusBadge=info.can_call
            ?'<span class="hotel-status status-can">✅ 呼べる</span>'
            :'<span class="hotel-status status-cannot">❌ 呼べない</span>';

        // 詳細情報（有料のみ）
        let detailsHtml="";
        if(isPaid){
            const parts=[];
            if(info.transport_fee!==null&&info.transport_fee!==undefined){
                parts.push(`<div>🚕 交通費: ${info.transport_fee===0?"無料":"¥"+Number(info.transport_fee).toLocaleString()+"-"}</div>`);
            }
            const svcList=serviceMap[info.id];
            if(svcList&&svcList.length>0){
                parts.push(`<div>🛎 サービス: ${svcList.map(s=>esc(s)).join(", ")}</div>`);
            }
            if(info.memo){
                parts.push(`<div>📝 ${esc(info.memo)}</div>`);
            }
            if(parts.length>0)detailsHtml=`<div class="hotel-details">${parts.join("")}</div>`;
        }

        // この店舗の口コミ
        const hotelReports=reportsMap[info.hotel_id]||[];
        const reportsHtml=hotelReports.map(r=>{
            const tags=[...(r.can_call?(r.can_call_reasons||[]):(r.cannot_call_reasons||[])),...(r.conditions||[])];
            const tagCls=r.can_call?"tag-can":"tag-cannot";
            const tagsHtml=tags.map(t=>`<span class="report-tag ${tagCls}">${esc(t)}</span>`).join("");
            const metaTags=[
                r.time_slot?`<span class="report-tag tag-meta">🕐${esc(r.time_slot)}</span>`:"",
                r.room_type?`<span class="report-tag tag-meta">🛏${esc(r.room_type)}</span>`:""
            ].join("");
            return`<div class="report-card">
                <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
                    <span class="report-date">${formatDate(r.created_at)}</span>
                    <span class="report-tag ${r.can_call?'tag-can':'tag-cannot'}" style="font-weight:700;">${r.can_call?'✅ 呼べた':'❌ 呼べなかった'}</span>
                    ${tagsHtml}${metaTags}
                </div>
                ${r.comment?`<div class="report-comment">${esc(r.comment)}</div>`:""}
            </div>`;
        }).join("");

        const addr=hotel.address||"";
        const stationHtml=hotel.nearest_station?`<div class="hotel-meta">🚉 ${esc(hotel.nearest_station)}</div>`:"";
        const priceHtml=hotel.min_charge?`<span style="font-size:11px;color:var(--gold);">最安値 ¥${parseInt(hotel.min_charge).toLocaleString()}~</span>`:"";

        return`<div class="hotel-card">
            <div class="hotel-name">${esc(hotel.name)}</div>
            <div class="hotel-meta">📍 ${esc(addr)}</div>
            ${stationHtml}
            ${priceHtml?`<div class="hotel-meta">${priceHtml}</div>`:""}
            ${statusBadge}
            ${detailsHtml}
            ${reportsHtml?`<div style="margin-top:8px;">${reportsHtml}</div>`:""}
            <a class="portal-link" href="https://yobuho.com/portal.html?hotel=${hotel.id}" target="_blank" rel="noopener">📍 ホテル詳細を見る</a>
        </div>`;
    }).join("");

    main.innerHTML=`
        <div class="shop-header">
            <div class="shop-name">${esc(shop.shop_name)}</div>
            <span class="genre-badge">${esc(GENRE_LABELS[shop.gender_mode]||"")}</span>
            ${contactHtml?`<div class="shop-contact">${contactHtml}</div>`:""}
        </div>
        ${filterHtml}
        <div style="margin-bottom:8px;font-size:12px;color:var(--text-3);">対応ホテル ${filtered.length}件</div>
        ${cardsHtml||'<div class="empty-msg">登録されたホテル情報はまだありません。</div>'}
    `;
}
</script>
</body>
</html>
