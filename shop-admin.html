<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>店舗管理パネル | Deri Hotel Navi</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --rose:#b05570;--rose-dim:#8e3f56;--rose-bg:rgba(176,85,112,0.08);--rose-border:rgba(176,85,112,0.25);
            --gold:#c9a84c;--gold-dim:#a08030;--gold-bg:rgba(201,168,76,0.08);--gold-border:rgba(201,168,76,0.25);
            --bg:#0a0a0f;--bg-2:#111118;--bg-3:#1a1a24;--bg-4:#22222e;
            --border:rgba(255,255,255,0.08);--border-s:rgba(255,255,255,0.15);
            --text:#f0ede8;--text-2:rgba(240,237,232,0.7);--text-3:rgba(240,237,232,0.4);
            --red:#c05050;--green:#3a9a60;--blue:#5a8abf;
            --r:10px;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:"Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

        /* ===== ログイン ===== */
        .login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
        .logo{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:300;letter-spacing:0.12em;color:var(--gold);margin-bottom:6px;text-align:center;}
        .logo em{font-style:italic;font-weight:600;}
        .logo-sub{font-size:11px;color:var(--text-3);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:32px;text-align:center;}
        .login-card{background:var(--bg-2);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.3);}
        .login-card h2{font-size:18px;font-weight:700;margin-bottom:4px;}
        .login-card .sub{font-size:12px;color:var(--text-3);margin-bottom:24px;}
        .f-group{margin-bottom:16px;}
        .f-label{display:block;font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:6px;letter-spacing:0.5px;}
        .f-input{width:100%;padding:11px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.2s;}
        .f-input:focus{border-color:var(--rose);}
        .f-input::placeholder{color:var(--text-3);}
        .btn-login{width:100%;padding:13px;background:var(--rose);border:none;border-radius:var(--r);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.2s;margin-top:8px;}
        .btn-login:hover{background:var(--rose-dim);}
        .login-error{color:var(--red);font-size:12px;margin-top:10px;display:none;}

        /* ===== ヘッダー ===== */
        .hdr{background:var(--bg-2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:400;display:none;}
        .hdr-inner{max-width:1000px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:12px;}
        .hdr-logo{font-family:"Cormorant Garamond",serif;font-size:16px;font-weight:300;color:var(--gold);letter-spacing:0.08em;}
        .hdr-logo em{font-style:italic;font-weight:600;}
        .hdr-shop{font-size:13px;font-weight:700;color:var(--text);margin-left:12px;}
        .hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
        .btn-logout{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--text-3);font-size:11px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
        .btn-logout:hover{border-color:var(--red);color:var(--red);}

        /* ===== メインレイアウト ===== */
        .main-wrap{max-width:1000px;margin:0 auto;padding:20px;display:none;}
        .card{background:var(--bg-2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,0.15);}
        .card-title{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
        .card-title .sub{font-size:11px;font-weight:400;color:var(--text-3);margin-left:auto;}

        /* ===== パンくず ===== */
        .breadcrumb{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:14px;font-size:12px;}
        .breadcrumb-item{color:var(--text-3);cursor:pointer;transition:color 0.15s;}
        .breadcrumb-item:hover{color:var(--rose);}
        .breadcrumb-item.active{color:var(--text);cursor:default;font-weight:600;}
        .breadcrumb-sep{color:var(--text-3);font-size:10px;}

        /* ===== 戻るボタン ===== */
        .btn-back{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r);color:var(--text-2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-bottom:14px;}
        .btn-back:hover{border-color:var(--rose-border);color:var(--text);}

        /* ===== エリアボタングリッド ===== */
        .area-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:16px;}
        .area-btn{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg-3);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.15s;text-align:left;}
        .area-btn:hover{border-color:var(--rose-border);background:var(--bg-4);transform:translateY(-1px);}
        .area-btn .area-name{font-size:13px;font-weight:600;}
        .area-btn .area-count{font-size:11px;color:var(--text-3);background:var(--bg);padding:2px 8px;border-radius:10px;white-space:nowrap;}

        /* ===== 検索バー ===== */
        .search-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
        .search-input{flex:1;min-width:200px;padding:10px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color 0.2s;}
        .search-input:focus{border-color:var(--rose);}
        .search-input::placeholder{color:var(--text-3);}
        .btn-search{padding:10px 20px;background:var(--rose);border:none;border-radius:var(--r);color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s;white-space:nowrap;}
        .btn-search:hover{background:var(--rose-dim);}

        /* ===== ホテルカード ===== */
        .hotel-cards{display:grid;gap:10px;}
        .hotel-card{background:var(--bg-3);border:1px solid var(--border);border-radius:10px;padding:16px;transition:all 0.15s;animation:fadeIn 0.3s ease both;}
        .hotel-card:hover{border-color:var(--border-s);}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
        .hotel-card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;}
        .hotel-card-name{font-size:14px;font-weight:700;flex:1;}
        .hotel-card-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap;background:rgba(58,154,96,0.12);color:var(--green);border:1px solid rgba(58,154,96,0.25);}
        .hotel-card-info{font-size:11px;color:var(--text-3);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
        .hotel-card-footer{display:flex;justify-content:flex-end;margin-top:10px;}

        /* ===== 投稿フォーム（portal風） ===== */
        .info-form{display:none;}
        .info-form.active{display:block;}
        .form-hotel-name{font-size:14px;font-weight:700;color:var(--rose);margin-bottom:20px;padding:12px 16px;background:var(--rose-bg);border:1px solid var(--rose-border);border-radius:10px;}

        .form-group{margin-bottom:18px;}
        .form-label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:8px;letter-spacing:0.5px;}
        .form-label .req{display:inline-flex;align-items:center;padding:2px 8px;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;margin-left:4px;vertical-align:middle;}
        .form-label .opt{color:var(--text-3);font-weight:400;}

        /* トグルボタン */
        .toggle-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
        .toggle-btn{padding:14px;border:2px solid var(--border);border-radius:12px;background:var(--bg-3);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;color:var(--text-2);}
        .toggle-btn:hover{border-color:var(--border-s);}
        .toggle-btn.can.active{background:rgba(58,154,96,0.1);border-color:var(--green);color:var(--green);}
        .toggle-btn.cannot.active{background:rgba(192,80,80,0.1);border-color:var(--red);color:var(--red);}

        /* 条件セクション */
        .cond-section{display:none;margin-top:14px;padding:16px;background:var(--bg-4);border:1px solid var(--border);border-radius:10px;animation:fadeIn 0.2s ease;}
        .cond-section.active{display:block;}
        .cond-section.can-sec{border-color:rgba(58,154,96,0.2);}
        .cond-section.cant-sec{border-color:rgba(192,80,80,0.2);}
        .form-row{display:flex;gap:12px;flex-wrap:wrap;}
        .form-row>div{flex:1;min-width:0;}

        .f-select{width:100%;padding:10px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23888' stroke-width='1.5' fill='none'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;}
        .f-select:focus{border-color:var(--rose);}

        /* 交通費入力 */
        .transport-fee-group{display:flex;flex-direction:column;gap:10px;}
        .free-check{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-2);user-select:none;}
        .free-check input{width:16px;height:16px;cursor:pointer;accent-color:var(--rose);}
        .transport-fee-input{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--r);padding:0 12px;background:var(--bg-3);transition:border-color 0.2s;}
        .transport-fee-input:focus-within{border-color:var(--rose);}
        .fee-prefix,.fee-suffix{font-size:16px;font-weight:700;color:var(--text-2);}
        .transport-fee-input input{border:none;outline:none;font-size:16px;padding:10px 8px;flex:1;text-align:right;background:transparent;color:var(--text);font-family:inherit;}
        .transport-fee-input input::placeholder{color:var(--text-3);}

        .f-textarea{width:100%;padding:10px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:inherit;font-size:13px;outline:none;resize:vertical;min-height:80px;transition:border-color 0.2s;}
        .f-textarea:focus{border-color:var(--rose);}
        .f-textarea::placeholder{color:var(--text-3);}

        /* チェックグループ（理由・部屋タイプ・時間帯） */
        .check-group{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
        .check-item{display:flex;align-items:center;gap:6px;padding:7px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all 0.15s;font-size:12px;user-select:none;}
        .check-item:hover{border-color:var(--border-s);}
        .check-item input{display:none;}
        .check-item.checked{background:rgba(58,154,96,0.1);border-color:var(--green);color:var(--green);}
        .cant-sec .check-item.checked{background:rgba(192,80,80,0.1);border-color:var(--red);color:var(--red);}
        .check-item .ci-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--text-3);transition:all 0.15s;flex-shrink:0;}
        .check-item.checked .ci-dot{background:var(--green);border-color:var(--green);}
        .cant-sec .check-item.checked .ci-dot{background:var(--red);border-color:var(--red);}

        /* サービスチェックボックス */
        .service-checks{display:flex;flex-wrap:wrap;gap:8px;}
        .svc-check{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg-3);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all 0.15s;font-size:12px;user-select:none;}
        .svc-check:hover{border-color:var(--rose-border);}
        .svc-check input{display:none;}
        .svc-check.checked{background:var(--rose-bg);border-color:var(--rose);color:var(--rose);}
        .svc-check .svc-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--text-3);transition:all 0.15s;}
        .svc-check.checked .svc-dot{background:var(--rose);border-color:var(--rose);}

        /* 送信ボタン */
        .btn-submit{width:100%;padding:15px;background:var(--rose);border:none;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:all 0.2s;letter-spacing:1px;margin-top:8px;}
        .btn-submit:hover{background:var(--rose-dim);transform:translateY(-1px);}
        .btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

        /* ===== 確認モーダル ===== */
        .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9995;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;}
        .confirm-overlay.active{display:flex;}
        .confirm-card{background:var(--bg-2);border:1px solid var(--border-s);border-radius:16px;padding:24px 20px 28px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 48px rgba(0,0,0,0.4);}
        .confirm-title{text-align:center;font-size:17px;font-weight:700;margin-bottom:4px;}
        .confirm-sub{text-align:center;font-size:12px;color:var(--text-3);margin-bottom:18px;}
        .confirm-row{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
        .confirm-label{font-size:12px;color:var(--text-3);width:100px;flex-shrink:0;padding-top:1px;}
        .confirm-value{font-size:13px;color:var(--text);flex:1;line-height:1.6;}
        .confirm-tag{display:inline-block;padding:3px 9px;border-radius:10px;font-size:11px;margin:2px 2px 2px 0;}
        .confirm-tag.green{background:rgba(58,154,96,0.15);border:1px solid rgba(58,154,96,0.3);color:var(--green);}
        .confirm-tag.red{background:rgba(192,80,80,0.12);border:1px solid rgba(192,80,80,0.25);color:var(--red);}
        .confirm-tag.blue{background:rgba(90,138,191,0.12);border:1px solid rgba(90,138,191,0.25);color:var(--blue);}
        .confirm-tag.rose{background:var(--rose-bg);border:1px solid var(--rose-border);color:var(--rose);}
        .confirm-btns{display:flex;gap:8px;margin-top:20px;}
        .confirm-btns .btn-back-confirm{flex:1;padding:13px;background:var(--bg-3);border:1px solid var(--border);border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--text-2);}
        .confirm-btns .btn-do-submit{flex:2;padding:13px;background:var(--rose);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.2s;}
        .confirm-btns .btn-do-submit:hover{background:var(--rose-dim);}
        .confirm-btns .btn-do-submit:disabled{opacity:0.5;cursor:not-allowed;}

        /* ===== ボタン共通 ===== */
        .btn{padding:8px 16px;border-radius:var(--r);border:1px solid;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap;}
        .btn-rose{background:var(--rose);color:#fff;border-color:var(--rose);}
        .btn-rose:hover{background:var(--rose-dim);border-color:var(--rose-dim);}
        .btn-outline{background:transparent;color:var(--text-2);border-color:var(--border);}
        .btn-outline:hover{border-color:var(--text-2);color:var(--text);}
        .btn-gold{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border);}
        .btn-gold:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
        .btn-red{background:transparent;color:var(--red);border-color:rgba(192,80,80,0.25);}
        .btn-red:hover{background:var(--red);color:#fff;border-color:var(--red);}
        .btn-row{display:flex;gap:8px;flex-wrap:wrap;}

        /* ===== 登録済みホテル一覧 ===== */
        .reg-list{display:grid;gap:8px;}
        .reg-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:8px;transition:all 0.15s;}
        .reg-row:hover{border-color:var(--border-s);}
        .reg-name{font-size:13px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .reg-status{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap;}
        .reg-status.can{background:rgba(58,154,96,0.12);color:var(--green);border:1px solid rgba(58,154,96,0.25);}
        .reg-status.cant{background:rgba(192,80,80,0.1);color:var(--red);border:1px solid rgba(192,80,80,0.2);}
        .reg-cost{font-size:11px;color:var(--text-3);white-space:nowrap;}
        .reg-actions{display:flex;gap:6px;}
        .pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;}
        .page-btn{padding:6px 12px;background:var(--bg-3);border:1px solid var(--border);border-radius:6px;color:var(--text-2);font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;}
        .page-btn:hover{border-color:var(--rose-border);color:var(--text);}
        .page-btn.active{background:var(--rose);color:#fff;border-color:var(--rose);}
        .page-btn:disabled{opacity:0.3;cursor:not-allowed;}
        .page-info{font-size:11px;color:var(--text-3);}

        /* ===== その他 ===== */
        .loading{text-align:center;padding:30px;color:var(--text-3);font-size:13px;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--bg-2);border:1px solid var(--border-s);color:var(--text);padding:10px 24px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.4);}
        .toast.show{opacity:1;}
        .tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;}
        .tab-btn{padding:10px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
        .tab-btn:hover{color:var(--text-2);}
        .tab-btn.active{color:var(--rose);border-bottom-color:var(--rose);}
        .tab-content{display:none;}
        .tab-content.active{display:block;}

        @media(max-width:640px){
            .area-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
            .area-btn{padding:10px 12px;}
            .area-btn .area-name{font-size:12px;}
            .form-row{flex-direction:column;}
            .hdr-inner{padding:10px 14px;}
            .hdr-shop{font-size:11px;}
            .main-wrap{padding:12px;}
            .card{padding:16px;}
            .search-bar{flex-direction:column;}
            .search-input{min-width:auto;}
            .reg-row{flex-wrap:wrap;}
            .reg-name{flex-basis:100%;}
        }
    </style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div class="login-wrap" id="login-wrap">
    <div class="logo"><em>Deri</em> Hotel Navi</div>
    <div class="logo-sub">Shop Admin Panel</div>
    <div class="login-card">
        <h2>店舗ログイン</h2>
        <div class="sub">登録時のメールアドレスとパスワードでログインしてください</div>
        <form id="login-form" onsubmit="handleLogin(event)">
        <div class="f-group">
            <label class="f-label">メールアドレス</label>
            <input type="email" class="f-input" id="login-email" name="email" autocomplete="email" placeholder="example@shop.com" required>
        </div>
        <div class="f-group">
            <label class="f-label">パスワード</label>
            <input type="password" class="f-input" id="login-pw" name="password" autocomplete="current-password" placeholder="パスワード" required>
        </div>
        <button type="submit" class="btn-login">ログイン</button>
        </form>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- ===== ヘッダー ===== -->
<div class="hdr" id="hdr">
    <div class="hdr-inner">
        <div class="hdr-logo"><em>Deri</em> Hotel Navi</div>
        <div class="hdr-shop" id="hdr-shop-name"></div>
        <div class="hdr-right">
            <button class="btn-logout" onclick="doLogout()">ログアウト</button>
        </div>
    </div>
</div>

<!-- ===== メインコンテンツ ===== -->
<div class="main-wrap" id="main-wrap">
    <div class="tabs">

    </div>

    <!-- ===== ホテル検索タブ ===== -->
    <div class="tab-content active" id="tab-search">
        <div class="card">
            <div class="card-title">ホテル名で検索</div>
            <div class="search-bar">
                <input class="search-input" id="hotel-keyword" placeholder="ホテル名・住所で検索..." onkeydown="if(event.key==='Enter')textSearch()">

            <div class="card-title">エリアから探す</div>

        </div>

        <!-- ===== 情報入力フォーム（portal風） ===== -->

                    <button class="toggle-btn cannot" id="btn-cannot" onclick="setCanCall(false)">❌ 呼べない</button>

                </div>
                <div class="form-group">
                    <label class="form-label">部屋タイプ <span class="opt">(任意・複数選択可)</span></label>
                    <div class="check-group" id="room-type-checks"></div>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">時間帯 <span class="opt">(任意・複数選択可)</span></label>
                    <div class="check-group" id="time-slot-checks"></div>
                </div>
            </div>

            <!-- 3. 呼べない場合の追加項目 -->
            <div class="cond-section cant-sec" id="cant-section">
                <div class="form-group" style="margin-bottom:0;">
                    <label class="form-label">呼べなかった理由 <span class="opt">(任意・複数選択可)</span></label>
                    <div class="check-group" id="cant-reason-checks"></div>
                </div>
            </div>

            <!-- 4. 店舗専用項目（常に表示） -->
            <div class="form-group" style="margin-top:18px;">
                <label class="form-label">交通費 <span class="opt">(任意)</span></label>
                <div class="transport-fee-group">
                    <label class="free-check"><input type="checkbox" id="transport-free" onchange="toggleTransportFee()"><span>交通費無料</span></label>
                    <div class="transport-fee-input" id="transport-fee-wrap">
                        <span class="fee-prefix">¥</span>
                        <input type="text" id="form-transport" inputmode="numeric" pattern="[0-9,]*" placeholder="0">
                        <span class="fee-suffix">-</span>
                    </div>
                </div>
            </div>

            <div class="form-group" id="service-group" style="display:none;">
                <label class="form-label">対応サービス <span class="opt">(任意)</span></label>
                <div class="service-checks" id="service-checks"></div>
            </div>

            <div class="form-group">
                <label class="form-label">メモ <span class="opt">(任意)</span></label>
                <textarea class="f-textarea" id="form-memo" placeholder="特記事項があれば入力..."></textarea>
            </div>

            <button class="btn-submit" id="btn-confirm" onclick="showConfirm()">確認画面に進む</button>
        </div>
    </div>

    <!-- ===== 登録済みホテル一覧タブ ===== -->
    <div class="tab-content" id="tab-list">
        <div class="card">
            <div class="card-title">登録済みホテル一覧<span class="sub" id="reg-count"></span></div>
            <div class="reg-list" id="reg-list"></div>
            <div class="pagination" id="pagination"></div>
        </div>

<script>
const SB_URL="https://ojkhwbvoaiaqekxrbpdd.supabase.co";
const SB_KEY="sb_publishable_UqlcQo5CdoPB_1s1ouLX9Q_olbwArKB";
const sb=supabase.createClient(SB_URL,SB_KEY);

function toast(msg,d=2500){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),d);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ===== 地方・都道府県マッピング =====
const REGION_MAP=[
    {label:"北海道",prefs:["北海道"]},{label:"東北",prefs:["青森県","岩手県","宮城県","秋田県","山形県","福島県"]},
    {label:"関東",prefs:["茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県"]},
    {label:"北陸",prefs:["富山県","石川県","福井県"]},{label:"甲信越",prefs:["新潟県","山梨県","長野県"]},
    {label:"東海",prefs:["岐阜県","静岡県","愛知県","三重県"]},
    {label:"関西",prefs:["滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県"]},
    {label:"中国",prefs:["鳥取県","島根県","岡山県","広島県","山口県"]},
    {label:"四国",prefs:["徳島県","香川県","愛媛県","高知県"]},
    {label:"九州",prefs:["福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県"]},
    {label:"沖縄",prefs:["沖縄県"]}
];
const HOTEL_TYPES={business:"ビジネス",city:"シティ",resort:"リゾート",ryokan:"旅館",pension:"ペンション",minshuku:"民宿",other:"その他"};

function extractCity(address){
    if(!address)return null;
    const P=["北海道","青森県","岩手県","宮城県","秋田県","山形県","福島県","茨城県","栃木県","群馬県","埼玉県","千葉県","東京都","神奈川県","新潟県","富山県","石川県","福井県","山梨県","長野県","岐阜県","静岡県","愛知県","三重県","滋賀県","京都府","大阪府","兵庫県","奈良県","和歌山県","鳥取県","島根県","岡山県","広島県","山口県","徳島県","香川県","愛媛県","高知県","福岡県","佐賀県","長崎県","熊本県","大分県","宮崎県","鹿児島県","沖縄県"];
    let after=address;for(const p of P){if(address.startsWith(p)){after=address.slice(p.length).trimStart();break;}}
    if(!after)return null;
    const base=after.replace(/^[\u4E00-\u9FFF\u3040-\u30FF]{1,5}郡/,"");let m;
    m=base.match(/^((?:(?!区)[\u4E00-\u9FFF\u3040-\u30FF]){1,10}?市)/);if(m)return m[1];
    m=base.match(/^([\u4E00-\u9FFF\u3040-\u30FF]{1,6}?区)/);if(m)return m[1];
    m=after.match(/^([\u4E00-\u9FFF\u3040-\u30FF]{1,5}郡[\u4E00-\u9FFF\u3040-\u30FF]{1,5}[町村])/);if(m)return m[1];
    return null;
}

// ===== 認証 =====
let currentShop=null;
const SESSION_KEY="shop_admin_session";

function handleLogin(e){e.preventDefault();doLogin();}
function doLogin(){
    const email=document.getElementById("login-email").value.trim();
    const pw=document.getElementById("login-pw").value;
    const errEl=document.getElementById("login-error");
    errEl.style.display="none";
    if(!email||!pw){errEl.textContent="メールとパスワードを入力してください";errEl.style.display="block";return;}
    sb.from("shops").select("*").eq("email",email).single().then(({data,error})=>{
        if(error||!data){errEl.textContent="メールアドレスが見つかりません";errEl.style.display="block";return;}
        try{const storedPw=atob(data.password_hash||"");if(storedPw!==pw){errEl.textContent="パスワードが正しくありません";errEl.style.display="block";return;}}catch(e){errEl.textContent="認証エラー";errEl.style.display="block";return;}
        if(data.status==="suspended"){errEl.textContent="このアカウントは停止中です";errEl.style.display="block";return;}
        currentShop=data;
        localStorage.setItem(SESSION_KEY,JSON.stringify({id:data.id,email:data.email}));
        onLoggedIn();
    });
}
function doLogout(){currentShop=null;localStorage.removeItem(SESSION_KEY);location.reload();}

function onLoggedIn(){
    document.getElementById("login-wrap").style.display="none";
    document.getElementById("hdr").style.display="block";
    document.getElementById("main-wrap").style.display="block";
    document.getElementById("hdr-shop-name").textContent=currentShop.shop_name||"店舗";
    loadMasterData();
    loadRegisteredHotelIds();
    loadRegisteredHotels();
    showJapanPage();
}

(function(){
    const saved=localStorage.getItem(SESSION_KEY);if(!saved)return;
    try{const sess=JSON.parse(saved);if(!sess.id)return;
        sb.from("shops").select("*").eq("id",sess.id).single().then(({data,error})=>{
            if(error||!data||data.status==="suspended"){localStorage.removeItem(SESSION_KEY);return;}
            currentShop=data;onLoggedIn();
        });
    }catch(e){localStorage.removeItem(SESSION_KEY);}
})();

// ===== タブ切替 =====
function switchTab(name){
    document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active"));
    document.getElementById("tab-"+name).classList.add("active");
    document.getElementById("tab-btn-"+name).classList.add("active");
    if(name==="list")loadRegisteredHotels();
}

// ===== マスターデータ読み込み =====
let canReasons=[],cannotReasons=[],roomTypes=[],serviceOptions=[];
const TIME_SLOTS=["早朝 (5:00~8:00)","朝 (8:00~11:00)","昼 (11:00~16:00)","夕方 (16:00~18:00)","夜 (18:00~23:00)","深夜 (23:00~5:00)"];

async function loadMasterData(){
    const[cr,cnr,rt,so]=await Promise.all([
        sb.from("can_call_reasons").select("label").order("sort_order"),
        sb.from("cannot_call_reasons").select("label").order("sort_order"),
        sb.from("room_types").select("label").order("sort_order"),
        sb.from("shop_service_options").select("*").order("sort_order")
    ]);
    canReasons=(cr.data||[]).map(d=>d.label);
    cannotReasons=(cnr.data||[]).map(d=>d.label);
    roomTypes=(rt.data||[]).map(d=>d.label);
    serviceOptions=so.data||[];

    // チェックボックスグループ生成
    renderCheckGroup("can-reason-checks",canReasons);
    renderCheckGroup("cant-reason-checks",cannotReasons);
    renderCheckGroup("room-type-checks",roomTypes);
    renderCheckGroup("time-slot-checks",TIME_SLOTS);

    // サービス0件なら非表示
    document.getElementById("service-group").style.display=serviceOptions.length>0?"":"none";
}

function renderCheckGroup(containerId,items,selectedVals=[]){
    const wrap=document.getElementById(containerId);
    if(!wrap)return;
    wrap.innerHTML=items.map(v=>{
        const checked=selectedVals.includes(v);
        return`<label class="check-item${checked?" checked":""}" onclick="toggleCheckItem(this)"><input type="checkbox" value="${esc(v)}"${checked?" checked":""}><span class="ci-dot"></span>${esc(v)}</label>`;
    }).join("");
}
function toggleCheckItem(el){const cb=el.querySelector("input");cb.checked=!cb.checked;el.classList.toggle("checked",cb.checked);}
function getCheckedValues(containerId){return Array.from(document.querySelectorAll("#"+containerId+" input:checked")).map(cb=>cb.value);}
function clearCheckGroup(containerId){document.querySelectorAll("#"+containerId+" .check-item").forEach(el=>{el.classList.remove("checked");el.querySelector("input").checked=false;});}

function renderServiceChecks(selectedIds=[]){
    const wrap=document.getElementById("service-checks");
    if(!serviceOptions.length){wrap.innerHTML="";return;}
    wrap.innerHTML=serviceOptions.map(s=>{
        const checked=selectedIds.includes(s.id);
        return`<label class="svc-check${checked?" checked":""}" onclick="toggleSvcCheck(this)"><input type="checkbox" value="${s.id}"${checked?" checked":""}><span class="svc-dot"></span>${esc(s.name)}</label>`;
    }).join("");
}
function toggleSvcCheck(el){const cb=el.querySelector("input");cb.checked=!cb.checked;el.classList.toggle("checked",cb.checked);}
function getSelectedServices(){return Array.from(document.querySelectorAll("#service-checks input:checked")).map(cb=>parseInt(cb.value));}

let registeredHotelIds=new Set();

// ===== パンくず =====
function setBreadcrumb(crumbs){
    document.getElementById("breadcrumb").innerHTML=crumbs.map((c,i)=>{
        const isLast=i===crumbs.length-1;
        return`${i>0?'<span class="breadcrumb-sep">›</span>':''}<span class="breadcrumb-item${isLast?' active':''}"${!isLast&&c.onclick?' style="cursor:pointer" onclick="'+c.onclick+'"':''}>${esc(c.label)}</span>`;
    }).join("");
}

// ===== ナビゲーション =====
let pageStack=[];
function backLevel(){const prev=pageStack.pop();if(prev)prev();else showJapanPage();}

async function showJapanPage(){
    pageStack=[];setBreadcrumb([{label:"日本全国"}]);
    const nav=document.getElementById("area-nav");nav.innerHTML='<div class="loading">読み込み中...</div>';
    const rc=await Promise.all(REGION_MAP.map(async(r)=>{
        const res=await Promise.all(r.prefs.map(p=>sb.from("hotels").select("id",{count:"exact",head:true}).eq("prefecture",p).eq("is_published",true).then(({count})=>count||0)));
        return{label:r.label,count:res.reduce((a,b)=>a+b,0)};
    }));
    let h='<div class="area-grid">';
    rc.forEach((r,i)=>{if(r.count>0)h+=`<div class="area-btn" onclick="showPrefPage(${i})"><span class="area-name">${esc(r.label)}</span><span class="area-count">${r.count.toLocaleString()}件</span></div>`;});
    nav.innerHTML=h+'</div>';
}

async function showPrefPage(ri){
    const region=REGION_MAP[ri];pageStack=[()=>showJapanPage()];
    setBreadcrumb([{label:"日本全国",onclick:"showJapanPage()"},{label:region.label}]);
    const nav=document.getElementById("area-nav");nav.innerHTML='<div class="loading">読み込み中...</div>';
    const pc=await Promise.all(region.prefs.map(p=>sb.from("hotels").select("id",{count:"exact",head:true}).eq("prefecture",p).eq("is_published",true).then(({count})=>({pref:p,count:count||0}))));
    const sorted=pc.filter(r=>r.count>0).sort((a,b)=>b.count-a.count);
    let h=`<button class="btn-back" onclick="backLevel()">← 前へ</button><div class="area-grid">`;
    sorted.forEach(r=>{h+=`<div class="area-btn" onclick="showMajorAreaPage(${ri},'${r.pref}')"><span class="area-name">${esc(r.pref)}</span><span class="area-count">${r.count.toLocaleString()}件</span></div>`;});
    nav.innerHTML=h+'</div>';
}

async function showMajorAreaPage(ri,pref){
    pageStack=[()=>showJapanPage(),()=>showPrefPage(ri)];
    setBreadcrumb([{label:"日本全国",onclick:"showJapanPage()"},{label:REGION_MAP[ri].label,onclick:`showPrefPage(${ri})`},{label:pref}]);
    const nav=document.getElementById("area-nav");nav.innerHTML='<div class="loading">読み込み中...</div>';
    const{data}=await sb.from("hotels").select("major_area").eq("prefecture",pref).eq("is_published",true).limit(5000);
    const ac={};let nac=0;(data||[]).forEach(h=>{if(h.major_area)ac[h.major_area]=(ac[h.major_area]||0)+1;else nac++;});
    const areas=Object.keys(ac).sort((a,b)=>ac[b]-ac[a]);
    let h=`<button class="btn-back" onclick="backLevel()">← 前へ</button><div class="area-grid">`;
    areas.forEach(a=>{h+=`<div class="area-btn" onclick="showCityPage(${ri},'${esc(pref)}','${esc(a)}')"><span class="area-name">${esc(a)}</span><span class="area-count">${ac[a].toLocaleString()}件</span></div>`;});
    if(nac>0)h+=`<div class="area-btn" onclick="showHotels(${ri},'${esc(pref)}',null,null,null)"><span class="area-name">その他のエリア</span><span class="area-count">${nac.toLocaleString()}件</span></div>`;
    nav.innerHTML=h+'</div>';
}

async function showCityPage(ri,pref,majorArea){
    pageStack=[()=>showJapanPage(),()=>showPrefPage(ri),()=>showMajorAreaPage(ri,pref)];
    setBreadcrumb([{label:"日本全国",onclick:"showJapanPage()"},{label:REGION_MAP[ri].label,onclick:`showPrefPage(${ri})`},{label:pref,onclick:`showMajorAreaPage(${ri},'${pref}')`},{label:majorArea}]);
    const nav=document.getElementById("area-nav");nav.innerHTML='<div class="loading">読み込み中...</div>';
    const{data}=await sb.from("hotels").select("address,city,detail_area").eq("prefecture",pref).eq("major_area",majorArea).eq("is_published",true).limit(5000);
    const dac={};(data||[]).forEach(h=>{if(h.detail_area&&h.detail_area!==majorArea)dac[h.detail_area]=(dac[h.detail_area]||0)+1;});
    if(Object.keys(dac).length>0){
        const das=Object.keys(dac).sort((a,b)=>dac[b]-dac[a]);
        let h=`<button class="btn-back" onclick="backLevel()">← 前へ</button><div class="area-grid">`;
        das.forEach(da=>{h+=`<div class="area-btn" onclick="showDetailAreaCities(${ri},'${esc(pref)}','${esc(majorArea)}','${esc(da)}')"><span class="area-name">${esc(da)}</span><span class="area-count">${dac[da].toLocaleString()}件</span></div>`;});
        h+=`<div class="area-btn" onclick="showHotels(${ri},'${esc(pref)}','${esc(majorArea)}',null,null)"><span class="area-name">すべて表示</span><span class="area-count">${(data||[]).length.toLocaleString()}件</span></div>`;
        nav.innerHTML=h+'</div>';
    }else{
        const cc={};(data||[]).forEach(h=>{const c=h.city||extractCity(h.address);if(c)cc[c]=(cc[c]||0)+1;});
        const cities=Object.keys(cc).sort((a,b)=>cc[b]-cc[a]);
        let h=`<button class="btn-back" onclick="backLevel()">← 前へ</button><div class="area-grid">`;
        cities.forEach(c=>{h+=`<div class="area-btn" onclick="showHotels(${ri},'${esc(pref)}','${esc(majorArea)}',null,'${esc(c)}')"><span class="area-name">${esc(c)}</span><span class="area-count">${cc[c].toLocaleString()}件</span></div>`;});
        h+=`<div class="area-btn" onclick="showHotels(${ri},'${esc(pref)}','${esc(majorArea)}',null,null)"><span class="area-name">すべて表示</span><span class="area-count">${(data||[]).length.toLocaleString()}件</span></div>`;
        nav.innerHTML=h+'</div>';
    }
}

async function showDetailAreaCities(ri,pref,majorArea,detailArea){
    pageStack=[()=>showJapanPage(),()=>showPrefPage(ri),()=>showMajorAreaPage(ri,pref),()=>showCityPage(ri,pref,majorArea)];
    setBreadcrumb([{label:"日本全国",onclick:"showJapanPage()"},{label:REGION_MAP[ri].label,onclick:`showPrefPage(${ri})`},{label:pref,onclick:`showMajorAreaPage(${ri},'${pref}')`},{label:majorArea,onclick:`showCityPage(${ri},'${pref}','${majorArea}')`},{label:detailArea}]);
    const nav=document.getElementById("area-nav");nav.innerHTML='<div class="loading">読み込み中...</div>';
    const{data}=await sb.from("hotels").select("address,city,detail_area").eq("prefecture",pref).eq("major_area",majorArea).eq("detail_area",detailArea).eq("is_published",true).limit(5000);
    const cc={};(data||[]).forEach(h=>{const c=h.city||extractCity(h.address);if(c)cc[c]=(cc[c]||0)+1;});
    const cities=Object.keys(cc).sort((a,b)=>cc[b]-cc[a]);
    let h=`<button class="btn-back" onclick="backLevel()">← 前へ</button><div class="area-grid">`;
    cities.forEach(c=>{h+=`<div class="area-btn" onclick="showHotels(${ri},'${esc(pref)}','${esc(majorArea)}','${esc(detailArea)}','${esc(c)}')"><span class="area-name">${esc(c)}</span><span class="area-count">${cc[c].toLocaleString()}件</span></div>`;});
    h+=`<div class="area-btn" onclick="showHotels(${ri},'${esc(pref)}','${esc(majorArea)}','${esc(detailArea)}',null)"><span class="area-name">すべて表示</span><span class="area-count">${(data||[]).length.toLocaleString()}件</span></div>`;
    nav.innerHTML=h+'</div>';
}

async function showHotels(ri,pref,majorArea,detailArea,city){
    const region=REGION_MAP[ri];
    const crumbs=[{label:"日本全国",onclick:"showJapanPage()"}];
    crumbs.push({label:region.label,onclick:`showPrefPage(${ri})`});
    if(pref)crumbs.push({label:pref,onclick:`showMajorAreaPage(${ri},'${pref}')`});
    if(majorArea)crumbs.push({label:majorArea,onclick:`showCityPage(${ri},'${pref}','${majorArea}')`});
    if(detailArea)crumbs.push({label:detailArea,onclick:`showDetailAreaCities(${ri},'${pref}','${majorArea}','${detailArea}')`});
    if(city)crumbs.push({label:city});else{const last=crumbs[crumbs.length-1];delete last.onclick;}
    setBreadcrumb(crumbs);
    const stack=[()=>showJapanPage(),()=>showPrefPage(ri),()=>showMajorAreaPage(ri,pref)];
    if(majorArea)stack.push(()=>showCityPage(ri,pref,majorArea));
    if(detailArea)stack.push(()=>showDetailAreaCities(ri,pref,majorArea,detailArea));
    pageStack=stack;
    const nav=document.getElementById("area-nav");nav.innerHTML='<div class="loading">読み込み中...</div>';
    let q=sb.from("hotels").select("id,name,address,nearest_station,hotel_type").eq("is_published",true);
    if(pref)q=q.eq("prefecture",pref);
    if(majorArea)q=q.eq("major_area",majorArea);else q=q.is("major_area",null);
    if(detailArea)q=q.eq("detail_area",detailArea);
    if(city)q=q.eq("city",city);
    q=q.order("name").limit(100);
    const{data,error}=await q;
    if(error){nav.innerHTML=`<div class="loading">エラー: ${esc(error.message)}</div>`;return;}
    const hotels=data||[];
    nav.innerHTML=`<button class="btn-back" onclick="backLevel()">← 前へ</button><div style="font-size:12px;color:var(--text-3);margin-bottom:12px;">${hotels.length}件のホテル</div>`+renderHotelCards(hotels);
}

function renderHotelCards(hotels){
    if(!hotels.length)return'<div class="loading">ホテルがありません</div>';
    return'<div class="hotel-cards">'+hotels.map((h,i)=>{
        const isReg=registeredHotelIds.has(String(h.id));
        return`<div class="hotel-card" style="animation-delay:${Math.min(i*0.03,0.3)}s"><div class="hotel-card-head"><span class="hotel-card-name">${esc(h.name)}</span>${isReg?'<span class="hotel-card-badge">✅ 登録済み</span>':''}</div>${h.address?`<div class="hotel-card-info">📍 ${esc(h.address)}</div>`:''}${h.nearest_station?`<div class="hotel-card-info">🚉 ${esc(h.nearest_station)}</div>`:''}<div class="hotel-card-footer"><button class="btn btn-rose" onclick="selectHotelById(${h.id})">📝 情報登録</button></div></div>`;
    }).join("")+'</div>';
}

// ===== テキスト検索 =====
async function textSearch(){
    const kw=document.getElementById("hotel-keyword").value.trim();
    if(!kw){toast("検索キーワードを入力してください");return;}
    const wrap=document.getElementById("text-search-results");
    wrap.innerHTML='<div class="loading">検索中...</div>';
    const{data}=await sb.from("hotels").select("id,name,address,nearest_station,hotel_type").eq("is_published",true).or(`name.ilike.%${kw}%,address.ilike.%${kw}%`).order("name").limit(50);
    const hotels=data||[];
    if(!hotels.length){wrap.innerHTML='<div style="font-size:12px;color:var(--text-3);padding:10px 0;">該当するホテルがありません</div>';return;}
    wrap.innerHTML=`<div style="font-size:12px;color:var(--text-3);margin-bottom:8px;">${hotels.length}件見つかりました</div>`+renderHotelCards(hotels);
}

// ===== フォーム状態 =====
let formCanCall=null;

function setCanCall(val){
    formCanCall=val;
    document.getElementById("btn-can").classList.toggle("active",val===true);
    document.getElementById("btn-cannot").classList.toggle("active",val===false);
    document.getElementById("can-section").classList.toggle("active",val===true);
    document.getElementById("cant-section").classList.toggle("active",val===false);
    if(val===true){clearCheckGroup("cant-reason-checks");}
    else{clearCheckGroup("can-reason-checks");clearCheckGroup("room-type-checks");clearCheckGroup("time-slot-checks");}
}

// ===== ホテル選択 → フォーム =====
async function selectHotelById(hotelId){
    const{data:hotel}=await sb.from("hotels").select("id,name,address").eq("id",hotelId).single();
    if(!hotel){toast("ホテルが見つかりません");return;}
    const{data:existing}=await sb.from("shop_hotel_info").select("*").eq("shop_id",currentShop.id).eq("hotel_id",hotelId).maybeSingle();
    openForm(hotel,existing);
}

function openForm(hotel,existing){
    document.getElementById("form-hotel-name").textContent=hotel.name;
    document.getElementById("form-hotel-id").value=hotel.id;
    document.getElementById("form-edit-id").value=existing?existing.id:"";

    // リセット
    formCanCall=null;
    document.getElementById("btn-can").classList.remove("active");
    document.getElementById("btn-cannot").classList.remove("active");
    document.getElementById("can-section").classList.remove("active");
    document.getElementById("cant-section").classList.remove("active");
    clearCheckGroup("can-reason-checks");
    clearCheckGroup("cant-reason-checks");
    clearCheckGroup("room-type-checks");
    clearCheckGroup("time-slot-checks");
    document.getElementById("transport-free").checked=false;document.getElementById("transport-fee-wrap").style.display="flex";document.getElementById("form-transport").value="";document.getElementById("form-memo").value="";

    if(existing){
        setCanCall(existing.can_call);
        setTransportFee(existing.transport_fee);
        document.getElementById("form-memo").value=existing.memo||"";
        // サービス読み込み
        sb.from("shop_hotel_services").select("service_option_id").eq("shop_hotel_info_id",existing.id).then(({data})=>{
            renderServiceChecks((data||[]).map(d=>d.service_option_id));
        });
    }else{
        renderServiceChecks([]);
    }

    document.getElementById("info-form").classList.add("active");
    document.getElementById("info-form").scrollIntoView({behavior:"smooth",block:"start"});
}

function cancelForm(){
    document.getElementById("info-form").classList.remove("active");
    formCanCall=null;
}

// ===== 交通費入力 =====
(function(){
    const fInput=document.getElementById("form-transport");
    if(!fInput)return;
    fInput.addEventListener("input",function(){
        const raw=this.value.replace(/[^0-9]/g,"");
        const formatted=raw?parseInt(raw,10).toLocaleString("ja-JP"):"";
        if(this.value!==formatted)this.value=formatted;
    });
})();
function toggleTransportFee(){
    const fc=document.getElementById("transport-free");
    const wrap=document.getElementById("transport-fee-wrap");
    const fi=document.getElementById("form-transport");
    if(fc.checked){wrap.style.display="none";fi.value="";}
    else{wrap.style.display="flex";fi.focus();}
}
function getTransportFee(){
    if(document.getElementById("transport-free").checked)return 0;
    const raw=document.getElementById("form-transport").value.replace(/,/g,"");
    return raw?parseInt(raw,10):0;
}
function setTransportFee(num){
    const fc=document.getElementById("transport-free");
    const wrap=document.getElementById("transport-fee-wrap");
    const fi=document.getElementById("form-transport");
    if(num===null||num===undefined||num===0){fc.checked=true;wrap.style.display="none";fi.value="";return;}
    fc.checked=false;wrap.style.display="flex";fi.value=num.toLocaleString("ja-JP");
}
function formatFee(num){if(!num||num===0)return"無料";return"¥"+num.toLocaleString("ja-JP")+"-";}

// ===== 確認画面 =====

function showConfirm(){
    if(formCanCall===null){toast("「呼べる」か「呼べない」を選択してください");return;}

    const canCall=formCanCall;
    const canReasonArr=getCheckedValues("can-reason-checks");
    const cantReasonArr=getCheckedValues("cant-reason-checks");
    const roomTypeArr=getCheckedValues("room-type-checks");
    const timeSlotArr=getCheckedValues("time-slot-checks");
    const transportFee=getTransportFee();
    const memo=document.getElementById("form-memo").value.trim();
    const svcs=getSelectedServices();

    const resultText=canCall?'✅ 呼べる':'❌ 呼べない';
    const resultColor=canCall?'var(--green)':'var(--red)';

    function row(label,value){
        if(!value)return'';
        return`<div class="confirm-row"><div class="confirm-label">${label}</div><div class="confirm-value">${value}</div></div>`;
    }
    function tagsHtml(arr,cls){return arr.map(v=>`<span class="confirm-tag ${cls}">${esc(v)}</span>`).join("");}

    let html=`<div class="confirm-row"><div class="confirm-label">結果</div><div class="confirm-value" style="font-weight:700;color:${resultColor};">${resultText}</div></div>`;
    if(canCall&&canReasonArr.length)html+=row('呼べた理由',tagsHtml(canReasonArr,'green'));
    if(!canCall&&cantReasonArr.length)html+=row('呼べなかった理由',tagsHtml(cantReasonArr,'red'));
    if(canCall&&roomTypeArr.length)html+=row('部屋タイプ',tagsHtml(roomTypeArr,'blue'));
    if(canCall&&timeSlotArr.length)html+=row('時間帯',tagsHtml(timeSlotArr,'blue'));
    html+=row('交通費',formatFee(transportFee));
    if(svcs.length>0){
        const tags=svcs.map(sid=>{const s=serviceOptions.find(x=>x.id===sid);return s?`<span class="confirm-tag rose">${esc(s.name)}</span>`:'';}).join("");
        html+=row('対応サービス',tags);
    }
    if(memo)html+=row('メモ',esc(memo));
    html+=row('投稿者',esc(currentShop.shop_name||"店舗")+'<span style="font-size:11px;color:var(--text-3);margin-left:6px;">(店舗投稿)</span>');

    document.getElementById("confirm-content").innerHTML=html;
    const submitBtn=document.getElementById("btn-do-submit");
    submitBtn.disabled=false;submitBtn.textContent="この内容で保存する";
    document.getElementById("confirm-modal").classList.add("active");
}

function closeConfirm(){document.getElementById("confirm-modal").classList.remove("active");}

// ===== 保存処理 =====
async function doSubmit(){
    const submitBtn=document.getElementById("btn-do-submit");
    submitBtn.disabled=true;submitBtn.textContent="保存中...";

    const hotelId=document.getElementById("form-hotel-id").value;
    const editId=document.getElementById("form-edit-id").value;
    const canCall=formCanCall;
    const canReasonArr=getCheckedValues("can-reason-checks");
    const cantReasonArr=getCheckedValues("cant-reason-checks");
    const roomTypeArr=getCheckedValues("room-type-checks");
    const timeSlotArr=getCheckedValues("time-slot-checks");
    const transportFee=getTransportFee();
    const memo=document.getElementById("form-memo").value.trim()||null;
    const svcs=getSelectedServices();

    // 1. reportsテーブルにinsert
    const reportPayload={
        hotel_id:hotelId,
        can_call:canCall,
        poster_type:"shop",
        poster_name:currentShop.shop_name||"店舗",
        can_call_reasons:canCall?canReasonArr:[],
        cannot_call_reasons:!canCall?cantReasonArr:[],
        time_slot:timeSlotArr[0]||null,
        room_type:roomTypeArr[0]||null,
        comment:memo,
        gender_mode:currentShop.gender_mode||"men",
        guest_male:1,
        guest_female:0
    };
    const{error:repErr}=await sb.from("reports").insert(reportPayload);
    if(repErr){
        console.error("reports insert error:",JSON.stringify(repErr));
        if(repErr.code!=="23505"){
            submitBtn.disabled=false;submitBtn.textContent="この内容で保存する";
            closeConfirm();toast("投稿エラー: "+repErr.message);return;
        }
    }

    // 2. shop_hotel_infoテーブルにupsert
    const infoPayload={
        shop_id:currentShop.id,
        hotel_id:hotelId,
        can_call:canCall,
        transport_fee:transportFee||null,
        memo:memo
    };

    let infoId;
    if(editId){
        const{error}=await sb.from("shop_hotel_info").update(infoPayload).eq("id",editId);
        if(error){console.error("shop_hotel_info update error:",JSON.stringify(error));closeConfirm();submitBtn.disabled=false;submitBtn.textContent="この内容で保存する";toast("保存エラー: "+error.message);return;}
        infoId=editId;
    }else{
        const{data,error}=await sb.from("shop_hotel_info").insert(infoPayload).select().single();
        if(error){console.error("shop_hotel_info insert error:",JSON.stringify(error));closeConfirm();submitBtn.disabled=false;submitBtn.textContent="この内容で保存する";toast("保存エラー: "+error.message);return;}
        infoId=data.id;
    }

    // 3. shop_hotel_servicesに保存
    await sb.from("shop_hotel_services").delete().eq("shop_hotel_info_id",infoId);
    if(svcs.length>0){
        await sb.from("shop_hotel_services").insert(svcs.map(sid=>({shop_hotel_info_id:infoId,service_option_id:sid})));
    }

    closeConfirm();
    cancelForm();
    registeredHotelIds.add(String(hotelId));
    loadRegisteredHotels();
    toast("✅ 保存しました");
}

// ===== 登録済みホテル一覧 =====
let regData=[];let regPage=1;const PER_PAGE=20;

async function loadRegisteredHotels(){
    if(!currentShop)return;
    const{data}=await sb.from("shop_hotel_info").select("*,hotels(name,address,hotel_type)").eq("shop_id",currentShop.id).order("created_at",{ascending:false});
    regData=data||[];regPage=1;renderRegistered();
}

function renderRegistered(){
    const total=regData.length;const totalPages=Math.ceil(total/PER_PAGE)||1;
    if(regPage>totalPages)regPage=totalPages;
    const start=(regPage-1)*PER_PAGE;const pageData=regData.slice(start,start+PER_PAGE);
    document.getElementById("reg-count").textContent=`全${total}件`;
    const wrap=document.getElementById("reg-list");
    if(!pageData.length){wrap.innerHTML='<div style="text-align:center;padding:30px;color:var(--text-3);font-size:13px;">登録済みホテルがありません</div>';document.getElementById("pagination").innerHTML="";return;}
    wrap.innerHTML=pageData.map(r=>{
        const name=r.hotels?r.hotels.name:"(削除済み)";
        const canLabel=r.can_call?'<span class="reg-status can">呼べる</span>':'<span class="reg-status cant">呼べない</span>';
        const tVal=r.transport_fee;
        const cost=tVal===null||tVal===undefined?"—":formatFee(tVal);
        return`<div class="reg-row"><span class="reg-name">${esc(name)}</span>${canLabel}<span class="reg-cost">交通費: ${cost}</span><div class="reg-actions"><button class="btn btn-gold" onclick="editRegistered('${r.id}')">編集</button><button class="btn btn-red" onclick="deleteRegistered('${r.id}')">削除</button></div></div>`;
    }).join("");
    if(totalPages<=1){document.getElementById("pagination").innerHTML="";return;}
    let pg='<button class="page-btn" onclick="goPage('+(regPage-1)+')"'+(regPage<=1?" disabled":"")+'>←</button>';
    for(let i=1;i<=totalPages;i++){if(totalPages>7&&Math.abs(i-regPage)>2&&i!==1&&i!==totalPages){if(i===2||i===totalPages-1)pg+='<span class="page-info">...</span>';continue;}pg+=`<button class="page-btn${i===regPage?" active":""}" onclick="goPage(${i})">${i}</button>`;}
    pg+='<button class="page-btn" onclick="goPage('+(regPage+1)+')"'+(regPage>=totalPages?" disabled":"")+'>→</button>';
    document.getElementById("pagination").innerHTML=pg;
}

function goPage(p){const tp=Math.ceil(regData.length/PER_PAGE)||1;if(p<1||p>tp)return;regPage=p;renderRegistered();}

async function editRegistered(infoId){
    const info=regData.find(r=>String(r.id)===String(infoId));if(!info)return;
    const hotel={id:info.hotel_id,name:info.hotels?info.hotels.name:"(不明)"};
    switchTab('search');openForm(hotel,info);
}

async function deleteRegistered(infoId){
    if(!confirm("この登録情報を削除しますか？"))return;
    const info=regData.find(r=>String(r.id)===String(infoId));
    await sb.from("shop_hotel_services").delete().eq("shop_hotel_info_id",infoId);
    const{error}=await sb.from("shop_hotel_info").delete().eq("id",infoId);
    if(error){toast("削除エラー: "+error.message);return;}
    regData=regData.filter(r=>String(r.id)!==String(infoId));
    if(info)registeredHotelIds.delete(String(info.hotel_id));
    renderRegistered();toast("🗑 削除しました");
}
</script>
