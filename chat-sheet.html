<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#1a1a1a">
<title>YobuChat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
}

/* === jofu (women) ネオモーフ + ピンクベージュ系テーマ ===
   chat.js setThemeMode が postMessage('ychat:theme', mode) で
   body.dataset.mode を設定. 他モード (men/men_same/women_same/este)
   は従来の白基調シートのまま (今回 women のみリファイン). */
body[data-mode="women"] {
  --thb-bg-base: #F5EAE4;
  --thb-bg-soft: #FBF6F2;
  --thb-bg-shadow: #EFE3DD;
  --thb-accent: #B85470;
  --thb-accent-soft: #C66B85;
  --thb-accent-deep: #A04960;
  --thb-shadow-light: rgba(255,255,255,0.92);
  --thb-shadow-dark: rgba(180,130,120,0.18);
  --thb-shadow-dark-strong: rgba(180,130,120,0.22);
  --thb-text-sub: #8B5666;
  background: var(--thb-bg-shadow);
}
body[data-mode="women"] #sheet {
  background: var(--thb-bg-base);
  border-radius: 24px 24px 0 0;
}
body[data-mode="women"] #top-bar {
  background: var(--thb-bg-base);
  border-bottom: none;
  box-shadow: 0 4px 12px -6px var(--thb-shadow-dark);
}
body[data-mode="women"] #handle {
  background: #C9B8B0;
  box-shadow:
    inset 1px 1px 2px rgba(160,120,110,0.3),
    inset -1px -1px 2px rgba(255,255,255,0.5);
}
body[data-mode="women"] #close-btn {
  background: var(--thb-bg-base);
  color: var(--thb-accent);
  box-shadow:
    3px 3px 7px var(--thb-shadow-dark-strong),
    -3px -3px 7px var(--thb-shadow-light);
  border-radius: 50%;
}
body[data-mode="women"] #close-btn:hover {
  transform: none;
  box-shadow:
    4px 4px 10px var(--thb-shadow-dark-strong),
    -4px -4px 10px var(--thb-shadow-light);
}
body[data-mode="women"] #close-btn:active {
  transform: scale(0.96);
  box-shadow:
    inset 2px 2px 5px var(--thb-shadow-dark-strong),
    inset -2px -2px 5px rgba(255,255,255,0.85);
}
body[data-mode="women"] #chat-frame {
  background: var(--thb-bg-base);
}
body[data-mode="women"] #err-msg {
  color: var(--thb-text-sub);
}

/* sheet 全体を visualViewport 追従の position:fixed で配置.
   iOS キーボード時は JS で top/height を vv.offsetTop / vv.height に揃えて
   キーボード上にぴったり収まるようにする. iframe の中 chat.js は
   iframe = viewport なので visualViewport の差分を感じない (= 静的レイアウト) で動く. */
#sheet {
  position: fixed;
  left: 0; right: 0;
  top: 0;
  height: 100%;
  background: #fff;
  transform: translateY(100%);
  transition: transform 280ms cubic-bezier(0.32,0.72,0,1);
  z-index: 2;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sheet.shown { transform: translateY(0); }
#sheet.dragging { transition: none; }

#top-bar {
  flex: 0 0 auto;
  height: calc(env(safe-area-inset-top, 0px) + 48px);
  background: #fff;
  position: relative;
  border-bottom: 1px solid #f2f2f2;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 6px;
  cursor: grab;
  touch-action: none;
}
#handle {
  width: 44px; height: 5px;
  background: #c8c8c8;
  border-radius: 3px;
  pointer-events: none;
}
#close-btn {
  position: absolute;
  right: 10px;
  bottom: 6px;
  width: 36px; height: 36px;
  border: none;
  background: linear-gradient(135deg, #ffd6e0 0%, #f5a6b9 100%);
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  line-height: 1;
  box-shadow: 0 2px 6px rgba(229, 122, 150, 0.35), inset 0 1px 0 rgba(255,255,255,0.5);
  transition: transform 160ms ease, box-shadow 160ms ease;
  letter-spacing: -0.02em;
}
#close-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 4px 10px rgba(229, 122, 150, 0.45), inset 0 1px 0 rgba(255,255,255,0.5);
}
#close-btn:active {
  transform: scale(0.94);
}

#chat-frame {
  flex: 1 1 auto;
  width: 100%;
  border: none;
  background: #fff;
  display: block;
}

#err-msg {
  flex: 1 1 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  color: #666;
  font-size: 14px;
  text-align: center;
  line-height: 1.6;
}
[hidden] { display: none !important; }

@media (min-width: 720px) {
  #sheet {
    left: 50%;
    transform: translate(-50%, 100%);
    width: 480px;
    max-width: 100vw;
  }
  #sheet.shown { transform: translate(-50%, 0); }
}
</style>
</head>
<body>
<div id="sheet" role="dialog" aria-modal="true" aria-label="チャット">
  <div id="top-bar">
    <div id="handle"></div>
    <button id="close-btn" type="button" aria-label="閉じる"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <iframe id="chat-frame" title="YobuChat" allow="clipboard-write"></iframe>
  <div id="err-msg" hidden>店舗が指定されていません。</div>
</div>

<script>
(function () {
  'use strict';

  function getParam(name) {
    var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
    return m ? decodeURIComponent(m[1]) : '';
  }

  var slug = (getParam('slug') || '').replace(/[^a-z0-9\-]/gi, '');
  var castParam = (getParam('cast') || '').replace(/[^a-z0-9\-]/gi, '');
  var resumeParam = (getParam('resume') || '').replace(/[^a-z0-9\-]/gi, '');

  // PC (mouse + hover): モーダル/シートUIは不要. 直URL /chat/{slug}/ にリダイレクト.
  // hover:hover かつ pointer:fine が真なら mouse 環境 = desktop. iPad/Android tablet は false.
  // location.replace で履歴に chat-sheet を残さない (戻る = ホストページに直帰).
  var isDesktop = window.matchMedia
    && window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  if (isDesktop && slug) {
    var redirectSrc = '/chat/' + slug + '/';
    var redirectQs = [];
    if (castParam) redirectQs.push('cast=' + encodeURIComponent(castParam));
    if (resumeParam) redirectQs.push('resume=' + encodeURIComponent(resumeParam));
    if (redirectQs.length) redirectSrc += '?' + redirectQs.join('&');
    location.replace(redirectSrc);
    return;
  }

  var sheet = document.getElementById('sheet');
  var topBar = document.getElementById('top-bar');
  var frame = document.getElementById('chat-frame');
  var errMsg = document.getElementById('err-msg');
  var closeBtn = document.getElementById('close-btn');

  if (!slug) {
    frame.style.display = 'none';
    errMsg.hidden = false;
  } else {
    // 直URL扱い: ?embed=1 を付けない. iframe のサイズ管理は親 (chat-sheet.html) が
    // visualViewport.resize に追従して行うので, iframe 内の chat.js は静的レイアウト
    // (iframe = viewport) として動く.
    var src = '/chat/' + slug + '/';
    var qs = [];
    if (castParam) qs.push('cast=' + encodeURIComponent(castParam));
    if (resumeParam) qs.push('resume=' + encodeURIComponent(resumeParam));
    if (qs.length) src += '?' + qs.join('&');
    frame.src = src;
  }

  // iframe 内 chat.js setThemeMode が postMessage で通知してくる.
  // body[data-mode] にセットすると CSS で women (jofu) のみネオモーフUIが有効に.
  // theme-color メタタグもモードに応じて更新 (iOS のステータスバー色).
  window.addEventListener('message', function (ev) {
    if (!ev.data || ev.data.type !== 'ychat:theme') return;
    var allowed = ['men','women','men_same','women_same','este'];
    if (allowed.indexOf(ev.data.mode) === -1) return;
    document.body.dataset.mode = ev.data.mode;
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) {
      var color = ev.data.mode === 'women' ? '#F5EAE4' : '#1a1a1a';
      meta.setAttribute('content', color);
    }
  });

  // iOS Safari: position:fixed は layout viewport (キーボード裏も含む) 全体に張られるため,
  // キーボード時に sheet 下部 (= 入力欄) が隠れる. visualViewport.resize を listen して
  // sheet の top/height を vv.offsetTop / vv.height に追従させると, sheet がキーボード上だけに
  // 収まり, iframe 内の入力欄もキーボード直上に表示される.
  var vv = window.visualViewport;
  function adjustSheet() {
    if (!vv) return;
    sheet.style.top = vv.offsetTop + 'px';
    sheet.style.height = vv.height + 'px';
  }
  if (vv) {
    vv.addEventListener('resize', adjustSheet);
    vv.addEventListener('scroll', adjustSheet);
    adjustSheet();
  }

  // 閉じる: history.back() → ホストページへ戻る (iOS bfcache で瞬時復帰)
  // 履歴がない直接アクセス時のフォールバックとして window.close() / about:blank.
  var closing = false;
  function closeSheet() {
    if (closing) return;
    closing = true;
    sheet.classList.remove('shown');
    setTimeout(function () {
      if (history.length > 1) {
        history.back();
      } else {
        try { window.close(); } catch (_) {}
        setTimeout(function () { location.replace('about:blank'); }, 150);
      }
    }, 220);
  }

  closeBtn.addEventListener('click', closeSheet);

  // ドラッグで閉じる: 上部バーから下スワイプ.
  // 閾値: 80px or 速度 0.5px/ms 以上で閉じる. 未満は元位置に戻す.
  // ✕ボタンへのタップとドラッグを区別するため, target=closeBtn の場合は dragstart しない.
  var dragStartY = 0;
  var dragStartTs = 0;
  var dragOffset = 0;
  var dragging = false;

  function onDragStart(e) {
    if (closing) return;
    if (e.target === closeBtn || closeBtn.contains(e.target)) return;
    var t = e.touches ? e.touches[0] : e;
    dragStartY = t.clientY;
    dragStartTs = Date.now();
    dragOffset = 0;
    dragging = true;
    sheet.classList.add('dragging');
  }
  function onDragMove(e) {
    if (!dragging) return;
    var t = e.touches ? e.touches[0] : e;
    var dy = t.clientY - dragStartY;
    if (dy < 0) dy = 0;
    dragOffset = dy;
    sheet.style.transform = 'translateY(' + dy + 'px)';
    if (e.cancelable) e.preventDefault();
  }
  function onDragEnd() {
    if (!dragging) return;
    dragging = false;
    sheet.classList.remove('dragging');
    var elapsed = Date.now() - dragStartTs;
    var velocity = elapsed > 0 ? dragOffset / elapsed : 0;
    if (dragOffset > 80 || velocity > 0.5) {
      closeSheet();
    } else {
      sheet.style.transform = '';
    }
  }
  topBar.addEventListener('touchstart', onDragStart, { passive: true });
  topBar.addEventListener('touchmove', onDragMove, { passive: false });
  topBar.addEventListener('touchend', onDragEnd);
  topBar.addEventListener('touchcancel', onDragEnd);

  // Escape キー (PC)
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeSheet();
  });

  // 入場アニメ
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      sheet.classList.add('shown');
    });
  });
})();
</script>
</body>
</html>
