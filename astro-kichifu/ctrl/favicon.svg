<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#06201f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- フロントは #ff2d55 のピンク「A」。CTRL はティールで明確に区別 -->
  <text x="30" y="46" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, system-ui, sans-serif"
        font-weight="900" font-size="40" letter-spacing="-2"
        fill="#2fd6cf" filter="url(#glow)">A</text>
  <!-- 管理を示す歯車（右下） -->
  <g transform="translate(47,47)" stroke="#2fd6cf" stroke-width="2.4" fill="none">
    <circle r="7.5" fill="#06201f"/>
    <circle r="2.8"/>
    <line x1="0" y1="-7.5" x2="0" y2="-11"/>
    <line x1="0" y1="7.5" x2="0" y2="11"/>
    <line x1="-7.5" y1="0" x2="-11" y2="0"/>
    <line x1="7.5" y1="0" x2="11" y2="0"/>
    <line x1="-5.3" y1="-5.3" x2="-7.8" y2="-7.8"/>
    <line x1="5.3" y1="5.3" x2="7.8" y2="7.8"/>
    <line x1="5.3" y1="-5.3" x2="7.8" y2="-7.8"/>
    <line x1="-5.3" y1="5.3" x2="-7.8" y2="7.8"/>
  </g>
</svg>
